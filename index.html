<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carreras De Caballos</title>
  <link rel="icon" href="favicon.ico">
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #1a1a1a;
      color: #fff;
      min-height: 100vh;
    }

    .container { max-width: 800px; margin: 0 auto; padding: 20px; }

    /* ── Header ── */
    header { text-align: center; margin-bottom: 28px; }
    .horse-img { width: 100%; max-height: 250px; object-fit: cover; border-radius: 8px 8px 0 0; margin-bottom: 15px; }
    h1 { font-size: 2.5rem; color: #f7d046; text-shadow: 2px 2px 4px rgba(0,0,0,.7); }
    header h2 { font-size: 1.5rem; color: #4d94ff; margin-top: 8px; }

    /* ── Wallet bar ── */
    #wallet-bar {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 10px;
      background: #2a2a2a; border: 1px solid #333;
      border-radius: 10px; padding: 12px 16px;
      margin-bottom: 24px;
    }
    #wallet-info { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    #wallet-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #555; flex-shrink: 0;
    }
    #wallet-dot.connected { background: #4caf50; }
    #wallet-addr { font-size: .85rem; color: #aaa; font-family: monospace; }
    #usdc-balance { font-size: .85rem; color: #f7d046; font-weight: bold; }

    /* ── Buttons ── */
    .btn {
      border: none; border-radius: 8px; padding: 10px 20px;
      font-size: .9rem; font-weight: bold; cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn-gold    { background: #f7d046; color: #1a1a1a; }
    .btn-blue    { background: #4d94ff; color: #fff; }
    .btn-outline { background: transparent; color: #f7d046; border: 1px solid #f7d046; }
    .btn-danger  { background: #c0392b; color: #fff; }
    .btn-sm      { padding: 7px 14px; font-size: .8rem; }
    .btn:not(:disabled):hover { opacity: .88; }

    /* ── Section headings ── */
    .section-title {
      font-size: 1.1rem; color: #4d94ff; font-weight: bold;
      margin-bottom: 14px; letter-spacing: .04em;
    }

    /* ── Market cards ── */
    #markets-section { margin-bottom: 28px; }
    #markets-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    }
    @media (max-width: 520px) { #markets-grid { grid-template-columns: 1fr; } }

    .market-card {
      background: #2a2a2a; border: 2px solid #333;
      border-radius: 10px; padding: 14px;
      cursor: pointer; transition: border-color .2s, background .2s;
    }
    .market-card:hover   { border-color: #555; }
    .market-card.active  { border-color: #f7d046; background: #2e2a1a; }
    .market-card.closed  { opacity: .5; cursor: not-allowed; }
    .market-card .race-id { font-size: .75rem; color: #888; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .05em; }
    .market-card .matchup { font-size: 1rem; color: #fff; font-weight: bold; margin-bottom: 8px; }
    .market-card .meta   { font-size: .78rem; color: #aaa; }
    .market-card .badge  {
      display: inline-block; font-size: .7rem; padding: 2px 8px;
      border-radius: 99px; margin-top: 6px; font-weight: bold;
    }
    .badge-open     { background: #1b4d1b; color: #4caf50; }
    .badge-closed   { background: #3a1a1a; color: #e57373; }
    .badge-resolved { background: #1a2a3a; color: #4d94ff; }

    #markets-empty {
      color: #666; font-size: .9rem; text-align: center;
      padding: 32px; background: #222; border-radius: 10px;
      border: 1px dashed #333;
    }

    /* ── Bet panel ── */
    #bet-panel {
      background: #222; border: 1px solid #333;
      border-radius: 12px; padding: 20px;
      margin-bottom: 20px;
    }
    #bet-panel.hidden { display: none; }

    #bet-race-title {
      font-size: 1rem; color: #f7d046; font-weight: bold;
      margin-bottom: 4px;
    }
    #bet-closes-at { font-size: .78rem; color: #888; margin-bottom: 16px; }

    /* Odds + horse buttons */
    #odds-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
      margin-bottom: 20px;
    }
    .horse-btn {
      border: 2px solid #444; border-radius: 10px;
      padding: 14px 10px; text-align: center;
      cursor: pointer; transition: border-color .2s, background .2s;
      background: #2a2a2a;
    }
    .horse-btn:hover  { border-color: #666; }
    .horse-btn.active-a { border-color: #f7d046; background: #2e2a1a; }
    .horse-btn.active-b { border-color: #4d94ff; background: #1a1f2e; }
    .horse-btn .horse-name { font-size: 1rem; font-weight: bold; margin-bottom: 4px; }
    .horse-btn .horse-odds { font-size: 1.4rem; font-weight: bold; }
    .horse-btn .odds-label { font-size: .72rem; color: #888; }
    #horse-a-btn .horse-odds { color: #f7d046; }
    #horse-b-btn .horse-odds { color: #4d94ff; }
    #horse-a-btn .horse-name { color: #f7d046; }
    #horse-b-btn .horse-name { color: #4d94ff; }

    /* Amount row */
    #amount-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 8px;
    }
    #amount-input {
      flex: 1; background: #333; border: 1px solid #444; border-radius: 8px;
      color: #fff; font-size: 1.1rem; padding: 10px 14px;
      outline: none; transition: border-color .2s;
    }
    #amount-input:focus { border-color: #f7d046; }
    #amount-input::placeholder { color: #666; }
    #balance-row {
      display: flex; justify-content: space-between; align-items: center;
      font-size: .8rem; color: #888; margin-bottom: 16px;
    }
    #balance-row span { color: #f7d046; }
    #max-btn { font-size: .75rem; }

    /* On-ramp */
    #onramp-section {
      background: #2a2a2a; border: 1px solid #3a3a3a;
      border-radius: 10px; padding: 14px 16px;
      margin-bottom: 16px;
    }
    #onramp-title { font-size: .85rem; color: #aaa; margin-bottom: 10px; }
    #onramp-btns  { display: flex; gap: 10px; flex-wrap: wrap; }
    .onramp-btn {
      display: flex; align-items: center; gap: 8px;
      border: none; border-radius: 8px; padding: 9px 16px;
      font-size: .85rem; font-weight: bold; cursor: pointer;
      transition: opacity .15s;
    }
    .onramp-btn:hover { opacity: .88; }
    .moonpay-btn  { background: #7b2fff; color: #fff; }
    .transak-btn  { background: #0f6fff; color: #fff; }
    .onramp-btn svg { flex-shrink: 0; }

    /* Place bet button */
    #place-bet-btn { width: 100%; padding: 14px; font-size: 1rem; border-radius: 10px; }

    /* Status */
    #status-box {
      margin-top: 14px; padding: 12px 14px;
      border-radius: 8px; font-size: .85rem; line-height: 1.5;
    }
    #status-box.hidden  { display: none; }
    #status-box.info    { background: #1a2a3a; border: 1px solid #2a4a6a; color: #90caf9; }
    #status-box.success { background: #1b3a1b; border: 1px solid #2e6b2e; color: #a5d6a7; }
    #status-box.error   { background: #3a1a1a; border: 1px solid #6b2e2e; color: #ef9a9a; }
    #status-box a { color: inherit; text-decoration: underline; }

    /* Claim panel */
    #claim-panel {
      background: #1b3a1b; border: 1px solid #2e6b2e;
      border-radius: 10px; padding: 14px 16px; margin-top: 14px;
    }
    #claim-panel.hidden { display: none; }
    #claim-panel p { font-size: .88rem; color: #a5d6a7; margin-bottom: 10px; }
    #claim-btn { background: #4caf50; color: #fff; border: none; border-radius: 8px;
      padding: 9px 20px; font-size: .88rem; font-weight: bold; cursor: pointer; }

    .hidden { display: none !important; }
    .spin { display: inline-block; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="container">

  <!-- ── Header ── -->
  <header>
    <img src="logo.png" alt="Horse Racing" class="horse-img">
    <h1>CARRERAS DE CABALLOS</h1>
    <h2>Live Prediction Market</h2>
  </header>

  <!-- ── Wallet bar ── -->
  <div id="wallet-bar">
    <div id="wallet-info">
      <div id="wallet-dot"></div>
      <span id="wallet-addr">Not connected</span>
      <span id="usdc-balance" class="hidden"></span>
    </div>
    <button id="connect-btn" class="btn btn-gold">Connect Wallet</button>
  </div>

  <!-- ── Race picker ── -->
  <div id="markets-section">
    <div class="section-title">ACTIVE RACES</div>
    <div id="markets-grid">
      <div id="markets-empty">Connect your wallet to see races</div>
    </div>
  </div>

  <!-- ── Bet panel ── -->
  <div id="bet-panel" class="hidden">
    <div class="section-title">PLACE YOUR BET</div>
    <div id="bet-race-title"></div>
    <div id="bet-closes-at"></div>

    <!-- Horse selection with live odds -->
    <div id="odds-row">
      <div class="horse-btn" id="horse-a-btn" onclick="selectOutcome(1)">
        <div class="horse-name" id="horse-a-name">Horse A</div>
        <div class="horse-odds" id="horse-a-odds">50%</div>
        <div class="odds-label">implied odds</div>
      </div>
      <div class="horse-btn" id="horse-b-btn" onclick="selectOutcome(2)">
        <div class="horse-name" id="horse-b-name">Horse B</div>
        <div class="horse-odds" id="horse-b-odds">50%</div>
        <div class="odds-label">implied odds</div>
      </div>
    </div>

    <!-- USDC amount -->
    <div id="amount-row">
      <input id="amount-input" type="number" min="0" step="0.01" placeholder="0.00 USDC" oninput="onAmountChange(this.value)">
      <button class="btn btn-outline btn-sm" id="max-btn" onclick="setMax()">MAX</button>
    </div>
    <div id="balance-row">
      <span>Your USDC balance: <span id="balance-display">—</span></span>
    </div>

    <!-- On-ramp -->
    <div id="onramp-section">
      <div id="onramp-title">Need USDC? Buy with a credit card:</div>
      <div id="onramp-btns">
        <button class="onramp-btn moonpay-btn" onclick="openMoonPay()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="10" fill="white" fill-opacity=".25"/><path d="M8 12a4 4 0 1 1 8 0" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
          MoonPay
        </button>
        <button class="onramp-btn transak-btn" onclick="openTransak()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5 12h14M12 5l7 7-7 7" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Transak
        </button>
      </div>
    </div>

    <!-- Place bet -->
    <button id="place-bet-btn" class="btn btn-gold" onclick="placeBet()" disabled>
      Select a horse to continue
    </button>

    <!-- Claim winnings (resolved markets) -->
    <div id="claim-panel" class="hidden">
      <p id="claim-msg"></p>
      <button id="claim-btn" onclick="claimWinnings()">Claim Winnings</button>
    </div>

    <!-- Status messages -->
    <div id="status-box" class="hidden"></div>
  </div>

</div><!-- /container -->

<script>
// ─────────────────────────────────────────────────────────────────────────────
// CONFIG  — fill in after deploying contracts
// ─────────────────────────────────────────────────────────────────────────────
const CONFIG = {
  MARKET_ADDRESS:  'YOUR_HORSERACEMARKET_ADDRESS',   // from deploy script output
  USDC_ADDRESS:    'YOUR_USDC_ADDRESS',              // MockUSDC or real USDC
  CHAIN_ID:        80002,                            // Polygon Amoy
  CHAIN_HEX:       '0x13882',
  CHAIN_NAME:      'Polygon Amoy Testnet',
  RPC_URL:         'https://rpc-amoy.polygon.technology',
  EXPLORER:        'https://amoy.polygonscan.com',
  MOONPAY_API_KEY: 'YOUR_MOONPAY_API_KEY',          // moonpay.com → developers
  TRANSAK_API_KEY: 'YOUR_TRANSAK_API_KEY',          // transak.com → dashboard
};

// ─────────────────────────────────────────────────────────────────────────────
// ABIs (minimal)
// ─────────────────────────────────────────────────────────────────────────────
const MARKET_ABI = [
  'function marketCount() view returns (uint256)',
  'function getMarket(uint256 marketId) view returns (string raceId, string horseA, string horseB, uint256 closingTime, uint256 poolA, uint256 poolB, uint8 result, bool resolved, bool cancelled)',
  'function getOdds(uint256 marketId) view returns (uint256 oddsA, uint256 oddsB)',
  'function buyShares(uint256 marketId, uint8 outcome, uint256 grossAmount)',
  'function pendingPayout(uint256 marketId, address user) view returns (uint256)',
  'function claimWinnings(uint256 marketId)',
];

const ERC20_ABI = [
  'function balanceOf(address owner) view returns (uint256)',
  'function allowance(address owner, address spender) view returns (uint256)',
  'function approve(address spender, uint256 amount) returns (bool)',
  'function decimals() view returns (uint8)',
];

const USDC_DECIMALS = 6n;
const USDC_UNIT     = 10n ** USDC_DECIMALS;

// ─────────────────────────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────────────────────────
const S = {
  wallet:         null,   // checksummed address string
  provider:       null,   // ethers.BrowserProvider
  signer:         null,
  marketContract: null,
  usdcContract:   null,
  markets:        [],     // array of market objects
  marketId:       null,   // selected market index
  outcome:        null,   // 1 or 2
  amount:         '',     // human-readable USDC
  balance:        0n,     // raw USDC balance
  pendingPayout:  0n,
};

// ─────────────────────────────────────────────────────────────────────────────
// Wallet connection
// ─────────────────────────────────────────────────────────────────────────────
async function connect() {
  if (!window.ethereum) {
    return setStatus('MetaMask is not installed. <a href="https://metamask.io" target="_blank">Get MetaMask →</a>', 'error');
  }

  try {
    setStatus('Connecting…', 'info');
    S.provider = new ethers.BrowserProvider(window.ethereum);
    await S.provider.send('eth_requestAccounts', []);

    const network = await S.provider.getNetwork();
    if (network.chainId !== BigInt(CONFIG.CHAIN_ID)) {
      setStatus('Switching to ' + CONFIG.CHAIN_NAME + '…', 'info');
      try {
        await window.ethereum.request({
          method: 'wallet_switchEthereumChain',
          params: [{ chainId: CONFIG.CHAIN_HEX }],
        });
      } catch (switchErr) {
        if (switchErr.code === 4902) {
          await window.ethereum.request({
            method: 'wallet_addEthereumChain',
            params: [{
              chainId:  CONFIG.CHAIN_HEX,
              chainName: CONFIG.CHAIN_NAME,
              nativeCurrency: { name: 'MATIC', symbol: 'MATIC', decimals: 18 },
              rpcUrls: [CONFIG.RPC_URL],
              blockExplorerUrls: [CONFIG.EXPLORER],
            }],
          });
        } else throw switchErr;
      }
      // Re-create provider after chain switch
      S.provider = new ethers.BrowserProvider(window.ethereum);
    }

    S.signer = await S.provider.getSigner();
    S.wallet = await S.signer.getAddress();

    const contracted = isConfigured();
    if (contracted) {
      S.marketContract = new ethers.Contract(CONFIG.MARKET_ADDRESS, MARKET_ABI, S.signer);
      S.usdcContract   = new ethers.Contract(CONFIG.USDC_ADDRESS,   ERC20_ABI,  S.signer);
    }

    renderWalletBar();
    clearStatus();
    await Promise.all([loadMarkets(), updateBalance()]);

    // Listen for account/chain changes
    window.ethereum.on('accountsChanged', () => location.reload());
    window.ethereum.on('chainChanged',    () => location.reload());

  } catch (err) {
    if (err.code === 4001) clearStatus();
    else setStatus(err.message || 'Connection failed', 'error');
  }
}

function isConfigured() {
  return (
    CONFIG.MARKET_ADDRESS !== 'YOUR_HORSERACEMARKET_ADDRESS' &&
    CONFIG.USDC_ADDRESS   !== 'YOUR_USDC_ADDRESS'
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// Balance
// ─────────────────────────────────────────────────────────────────────────────
async function updateBalance() {
  if (!S.wallet || !S.usdcContract) return;
  try {
    S.balance = await S.usdcContract.balanceOf(S.wallet);
    document.getElementById('balance-display').textContent = formatUSDC(S.balance) + ' USDC';
    const balEl = document.getElementById('usdc-balance');
    balEl.textContent = formatUSDC(S.balance) + ' USDC';
    balEl.classList.remove('hidden');
  } catch (_) { /* no-op if contract not deployed */ }
}

// ─────────────────────────────────────────────────────────────────────────────
// Load markets from contract
// ─────────────────────────────────────────────────────────────────────────────
async function loadMarkets() {
  const grid = document.getElementById('markets-grid');

  if (!isConfigured()) {
    grid.innerHTML = `<div id="markets-empty">
      Contract not configured yet — fill in CONFIG.MARKET_ADDRESS and CONFIG.USDC_ADDRESS in index.html after deploying.
    </div>`;
    return;
  }

  if (!S.marketContract) return;

  try {
    const count = await S.marketContract.marketCount();
    S.markets = [];

    for (let i = 0n; i < count; i++) {
      const [raceId, horseA, horseB, closingTime, poolA, poolB, result, resolved, cancelled]
        = await S.marketContract.getMarket(i);
      const [oddsA, oddsB] = await S.marketContract.getOdds(i);

      S.markets.push({
        id: i,
        raceId, horseA, horseB,
        closingTime: Number(closingTime),
        poolA, poolB,
        oddsA: Number(oddsA),   // in BPS (out of 10000)
        oddsB: Number(oddsB),
        result: Number(result),
        resolved,
        cancelled,
      });
    }

    renderMarkets();
  } catch (err) {
    grid.innerHTML = `<div id="markets-empty" style="color:#e57373">
      Failed to load markets: ${err.message}
    </div>`;
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// Render helpers
// ─────────────────────────────────────────────────────────────────────────────
function renderWalletBar() {
  const dot  = document.getElementById('wallet-dot');
  const addr = document.getElementById('wallet-addr');
  const btn  = document.getElementById('connect-btn');

  if (S.wallet) {
    dot.classList.add('connected');
    addr.textContent = S.wallet.slice(0, 6) + '…' + S.wallet.slice(-4);
    btn.textContent  = 'Connected';
    btn.disabled     = true;
    btn.classList.replace('btn-gold', 'btn-outline');
  }
}

function renderMarkets() {
  const grid = document.getElementById('markets-grid');
  if (S.markets.length === 0) {
    grid.innerHTML = '<div id="markets-empty">No races available right now. Check back soon.</div>';
    return;
  }

  grid.innerHTML = S.markets.map(m => {
    const now       = Math.floor(Date.now() / 1000);
    const open      = !m.resolved && !m.cancelled && m.closingTime > now;
    const stateStr  = m.resolved ? 'Resolved' : m.cancelled ? 'Cancelled' : open ? 'Open' : 'Closed';
    const badgeCls  = m.resolved ? 'badge-resolved' : open ? 'badge-open' : 'badge-closed';
    const active    = S.marketId === m.id ? ' active' : '';
    const disabled  = (!open && !m.resolved) ? ' closed' : '';
    const totalUSDC = formatUSDC(m.poolA + m.poolB);
    const closeDate = new Date(m.closingTime * 1000).toLocaleString();

    return `<div class="market-card${active}${disabled}" onclick="selectMarket(${m.id})">
      <div class="race-id">${m.raceId}</div>
      <div class="matchup">${m.horseA} vs ${m.horseB}</div>
      <div class="meta">Pool: ${totalUSDC} USDC</div>
      <div class="meta">Closes: ${closeDate}</div>
      <span class="badge ${badgeCls}">${stateStr}</span>
    </div>`;
  }).join('');
}

function renderBetPanel() {
  const m = S.markets.find(x => x.id === S.marketId);
  if (!m) return;

  const now      = Math.floor(Date.now() / 1000);
  const isOpen   = !m.resolved && !m.cancelled && m.closingTime > now;
  const panel    = document.getElementById('bet-panel');

  panel.classList.remove('hidden');

  document.getElementById('bet-race-title').textContent = m.raceId + ' — ' + m.horseA + ' vs ' + m.horseB;
  document.getElementById('bet-closes-at').textContent  = isOpen
    ? 'Closes ' + new Date(m.closingTime * 1000).toLocaleString()
    : m.resolved ? 'Race resolved' : m.cancelled ? 'Race cancelled' : 'Betting closed';

  document.getElementById('horse-a-name').textContent = m.horseA;
  document.getElementById('horse-b-name').textContent = m.horseB;
  document.getElementById('horse-a-odds').textContent = bpsToPercent(m.oddsA);
  document.getElementById('horse-b-odds').textContent = bpsToPercent(m.oddsB);

  // Highlight selected horse
  document.getElementById('horse-a-btn').className = 'horse-btn' + (S.outcome === 1 ? ' active-a' : '');
  document.getElementById('horse-b-btn').className = 'horse-btn' + (S.outcome === 2 ? ' active-b' : '');

  // Show/hide bet controls based on market state
  const betControls = ['odds-row', 'amount-row', 'balance-row', 'onramp-section', 'place-bet-btn'];
  betControls.forEach(id => {
    document.getElementById(id).classList.toggle('hidden', !isOpen);
  });

  // Place-bet button label
  if (isOpen) {
    const btn = document.getElementById('place-bet-btn');
    if (!S.outcome) {
      btn.textContent = 'Select a horse to continue';
      btn.disabled    = true;
    } else if (!S.amount || parseFloat(S.amount) <= 0) {
      btn.textContent = 'Enter USDC amount';
      btn.disabled    = true;
    } else {
      const rawAmt = parseUSDC(S.amount);
      const insufficient = rawAmt > S.balance;
      btn.textContent = insufficient
        ? 'Insufficient USDC balance'
        : `Bet ${S.amount} USDC on ${S.outcome === 1 ? m.horseA : m.horseB}`;
      btn.disabled = insufficient || !S.wallet;
    }
  }

  // Claim panel
  renderClaimPanel(m);
}

async function renderClaimPanel(m) {
  const claimPanel = document.getElementById('claim-panel');
  if (!m.resolved || !S.wallet || !S.marketContract) {
    claimPanel.classList.add('hidden');
    return;
  }
  try {
    const payout = await S.marketContract.pendingPayout(m.id, S.wallet);
    if (payout > 0n) {
      claimPanel.classList.remove('hidden');
      document.getElementById('claim-msg').textContent =
        `You won! Pending payout: ${formatUSDC(payout)} USDC`;
    } else {
      claimPanel.classList.add('hidden');
    }
  } catch (_) {
    claimPanel.classList.add('hidden');
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// User interactions
// ─────────────────────────────────────────────────────────────────────────────
function selectMarket(id) {
  const m = S.markets.find(x => x.id === id);
  if (!m) return;
  // Disallow clicking cancelled markets that aren't resolved
  if (m.cancelled && !m.resolved) return;

  S.marketId = id;
  S.outcome  = null;
  S.amount   = '';
  document.getElementById('amount-input').value = '';
  clearStatus();
  renderMarkets();
  renderBetPanel();
  document.getElementById('bet-panel').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function selectOutcome(n) {
  const m = S.markets.find(x => x.id === S.marketId);
  if (!m || m.resolved || m.cancelled) return;
  S.outcome = n;
  renderBetPanel();
}

function onAmountChange(val) {
  S.amount = val;
  renderBetPanel();
}

function setMax() {
  const human = formatUSDC(S.balance);
  S.amount = human;
  document.getElementById('amount-input').value = human;
  renderBetPanel();
}

// ─────────────────────────────────────────────────────────────────────────────
// On-ramp (MoonPay + Transak)
// ─────────────────────────────────────────────────────────────────────────────
function openMoonPay() {
  const addr   = S.wallet || '';
  const amount = parseFloat(S.amount) || 0;
  const params = new URLSearchParams({
    apiKey:               CONFIG.MOONPAY_API_KEY,
    currencyCode:         'usdc_polygon',
    walletAddress:        addr,
    baseCurrencyAmount:   amount || '',
    lockAmount:           amount > 0 ? 'true' : 'false',
    colorCode:            '%23f7d046',
    showWalletAddressForm:'false',
  });
  window.open('https://buy.moonpay.com?' + params.toString(), '_blank', 'width=500,height=650');
}

function openTransak() {
  const addr   = S.wallet || '';
  const amount = parseFloat(S.amount) || 0;
  const params = new URLSearchParams({
    apiKey:                      CONFIG.TRANSAK_API_KEY,
    cryptoCurrencyCode:          'USDC',
    network:                     'polygon',
    walletAddress:               addr,
    disableWalletAddressForm:    'true',
    defaultCryptoCurrencyAmount: amount || '',
    themeColor:                  'f7d046',
    exchangeScreenTitle:         'Buy USDC to bet',
  });
  window.open('https://global.transak.com?' + params.toString(), '_blank', 'width=500,height=700');
}

// ─────────────────────────────────────────────────────────────────────────────
// Place bet
// ─────────────────────────────────────────────────────────────────────────────
async function placeBet() {
  if (!S.wallet)    return setStatus('Connect your wallet first.', 'error');
  if (!S.outcome)   return setStatus('Select a horse.', 'error');
  if (!S.amount || parseFloat(S.amount) <= 0) return setStatus('Enter an amount.', 'error');

  const rawAmount = parseUSDC(S.amount);
  if (rawAmount > S.balance) return setStatus('Insufficient USDC balance. Use the on-ramp to buy USDC.', 'error');

  const btn = document.getElementById('place-bet-btn');
  btn.disabled = true;

  try {
    // 1. Check allowance
    const allowance = await S.usdcContract.allowance(S.wallet, CONFIG.MARKET_ADDRESS);
    if (allowance < rawAmount) {
      setStatus('<span class="spin">⟳</span> Approving USDC… (confirm in MetaMask)', 'info');
      const approveTx = await S.usdcContract.approve(CONFIG.MARKET_ADDRESS, rawAmount);
      setStatus('<span class="spin">⟳</span> Waiting for approval confirmation…', 'info');
      await approveTx.wait();
    }

    // 2. Buy shares
    const m = S.markets.find(x => x.id === S.marketId);
    setStatus('<span class="spin">⟳</span> Placing bet… (confirm in MetaMask)', 'info');
    const tx = await S.marketContract.buyShares(S.marketId, S.outcome, rawAmount);

    setStatus('<span class="spin">⟳</span> Waiting for confirmation…', 'info');
    await tx.wait();

    const horseName = S.outcome === 1 ? m.horseA : m.horseB;
    setStatus(
      `✓ Bet placed! ${S.amount} USDC on <strong>${horseName}</strong>. ` +
      `<a href="${CONFIG.EXPLORER}/tx/${tx.hash}" target="_blank">View on explorer →</a>`,
      'success'
    );

    // Reset and refresh
    S.outcome = null;
    S.amount  = '';
    document.getElementById('amount-input').value = '';
    await Promise.all([updateBalance(), loadMarkets()]);
    renderBetPanel();

  } catch (err) {
    if (err.code === 4001 || err.code === 'ACTION_REJECTED') {
      setStatus('Transaction cancelled.', 'error');
    } else {
      setStatus('Error: ' + (err.reason || err.message), 'error');
    }
  } finally {
    btn.disabled = false;
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// Claim winnings
// ─────────────────────────────────────────────────────────────────────────────
async function claimWinnings() {
  const btn = document.getElementById('claim-btn');
  btn.disabled = true;
  try {
    setStatus('<span class="spin">⟳</span> Claiming… (confirm in MetaMask)', 'info');
    const tx = await S.marketContract.claimWinnings(S.marketId);
    setStatus('<span class="spin">⟳</span> Waiting for confirmation…', 'info');
    await tx.wait();
    setStatus(
      `✓ Winnings claimed! <a href="${CONFIG.EXPLORER}/tx/${tx.hash}" target="_blank">View on explorer →</a>`,
      'success'
    );
    document.getElementById('claim-panel').classList.add('hidden');
    await updateBalance();
  } catch (err) {
    if (err.code === 4001 || err.code === 'ACTION_REJECTED') {
      setStatus('Transaction cancelled.', 'error');
    } else {
      setStatus('Error: ' + (err.reason || err.message), 'error');
    }
  } finally {
    btn.disabled = false;
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// Status helpers
// ─────────────────────────────────────────────────────────────────────────────
function setStatus(html, type) {
  const box = document.getElementById('status-box');
  box.innerHTML   = html;
  box.className   = 'status-box ' + type;  // keeps layout, sets colour
  box.classList.remove('hidden');
}

function clearStatus() {
  const box = document.getElementById('status-box');
  box.classList.add('hidden');
}

// ─────────────────────────────────────────────────────────────────────────────
// Utility
// ─────────────────────────────────────────────────────────────────────────────
function formatUSDC(raw) {
  // raw is BigInt with 6 decimal places
  const n = Number(raw) / 1e6;
  return n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function parseUSDC(humanStr) {
  // Returns BigInt with 6 decimal places
  const f = parseFloat(humanStr) || 0;
  return BigInt(Math.round(f * 1e6));
}

function bpsToPercent(bps) {
  return (bps / 100).toFixed(1) + '%';
}

// ─────────────────────────────────────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────────────────────────────────────
document.getElementById('connect-btn').addEventListener('click', connect);

// Auto-reconnect if MetaMask is already authorized
window.addEventListener('load', async () => {
  if (!window.ethereum) return;
  try {
    const accounts = await window.ethereum.request({ method: 'eth_accounts' });
    if (accounts.length > 0) connect();
  } catch (_) { /* silent */ }
});
</script>
