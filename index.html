<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CarrerasOS · Dinero Parejo · 06 de Junio</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --g:#39FF14;   /* neon green */
  --gd:#1aff00;  /* glow green */
  --bg:#000;
  --w:#fff;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#0a0a0a;
  font-family:'Barlow Condensed',sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:16px;
}

/* ── flyer shell ── */
.flyer{
  width:min(520px,100%);
  background:#000;
  border:3px solid var(--g);
  box-shadow:0 0 40px rgba(57,255,20,.25),0 0 80px rgba(57,255,20,.08);
  position:relative;
  overflow:hidden;
}

/* ── canvas bg ── */
#bgc{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0}

/* ensure all content above canvas */
.flyer>*:not(#bgc){position:relative;z-index:1}

/* ── top header strip ── */
.hdr{
  background:var(--g);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:8px 14px;
}
.hdr-brand{
  display:flex;align-items:center;gap:7px;
  font-family:'Bebas Neue',sans-serif;
  font-size:1.5rem;letter-spacing:.08em;color:#000;
}
.hdr-brand svg{flex-shrink:0}
.hdr-date{
  font-family:'Bebas Neue',sans-serif;
  font-size:1.1rem;letter-spacing:.12em;color:#000;
  text-align:right;line-height:1.1;
}

/* ── main title ── */
.title-wrap{
  text-align:center;
  padding:20px 12px 10px;
  background:linear-gradient(180deg,#000 0%,#050505 100%);
}
.main-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(4rem,18vw,6.5rem);
  line-height:.85;
  color:#fff;
  letter-spacing:.02em;
  text-shadow:0 0 30px rgba(57,255,20,.5),0 0 60px rgba(57,255,20,.2);
}
.jugada{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(1rem,5vw,1.55rem);
  letter-spacing:.18em;
  color:var(--g);
  margin-top:6px;
  text-shadow:0 0 16px rgba(57,255,20,.6);
}
.venue-line{
  font-size:clamp(.8rem,3.5vw,1rem);
  letter-spacing:.18em;
  text-transform:uppercase;
  color:rgba(255,255,255,.55);
  margin-top:5px;
}

/* ── gate numbers ── */
.gates{
  display:flex;justify-content:center;gap:5px;
  padding:10px 12px;
  background:rgba(57,255,20,.06);
  border-top:1.5px solid rgba(57,255,20,.35);
  border-bottom:1.5px solid rgba(57,255,20,.35);
}
.gate{
  width:clamp(28px,7vw,38px);height:clamp(28px,7vw,38px);
  border:2px solid var(--g);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(.9rem,4vw,1.2rem);
  color:var(--g);
  text-shadow:0 0 8px rgba(57,255,20,.8);
  box-shadow:0 0 8px rgba(57,255,20,.15) inset;
}

/* ── race track / horses ── */
.track-wrap{
  position:relative;
  height:clamp(160px,45vw,220px);
  overflow:hidden;
  background:#000;
  border-bottom:1.5px solid rgba(57,255,20,.25);
}
/* track lane lines */
.track-wrap::before{
  content:'';
  position:absolute;inset:0;
  background:repeating-linear-gradient(
    180deg,
    transparent 0px,transparent 38px,
    rgba(57,255,20,.04) 38px,rgba(57,255,20,.04) 40px
  );
  pointer-events:none;
}
/* dirt texture */
.track-wrap::after{
  content:'';
  position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 100%,rgba(57,255,20,.06) 0%,transparent 70%);
  pointer-events:none;
}
#tc{width:100%;height:100%;display:block}

/* center badge */
.badge{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:clamp(100px,26vw,130px);height:clamp(100px,26vw,130px);
  border-radius:50%;
  background:rgba(0,0,0,.9);
  border:3px solid var(--g);
  box-shadow:0 0 30px rgba(57,255,20,.5),0 0 60px rgba(57,255,20,.15),inset 0 0 20px rgba(57,255,20,.08);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;
  animation:badgePulse 2.5s ease-in-out infinite;
}
@keyframes badgePulse{
  0%,100%{box-shadow:0 0 30px rgba(57,255,20,.5),0 0 60px rgba(57,255,20,.15),inset 0 0 20px rgba(57,255,20,.08)}
  50%{box-shadow:0 0 50px rgba(57,255,20,.8),0 0 100px rgba(57,255,20,.3),inset 0 0 30px rgba(57,255,20,.15)}
}
.badge-logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(1rem,4vw,1.4rem);
  letter-spacing:.06em;
  color:var(--g);
  line-height:1;
  text-shadow:0 0 12px rgba(57,255,20,.9);
}
.badge-sub{
  font-size:clamp(.6rem,2vw,.75rem);
  letter-spacing:.1em;
  color:rgba(57,255,20,.6);
  text-transform:uppercase;
  margin-top:3px;
}

/* ── distance ── */
.distance{
  text-align:center;
  padding:8px 12px;
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(1.8rem,7vw,2.6rem);
  color:var(--g);
  letter-spacing:.25em;
  text-shadow:0 0 20px rgba(57,255,20,.6);
  background:rgba(57,255,20,.04);
  border-bottom:1.5px solid rgba(57,255,20,.2);
}

/* ── matchup ── */
.matchup{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  border-top:1.5px solid rgba(57,255,20,.3);
}
.team{
  padding:14px 10px;
  text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:6px;
}
.team-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(1.6rem,7vw,2.4rem);
  color:#fff;
  letter-spacing:.04em;
  line-height:1;
  text-shadow:0 0 12px rgba(255,255,255,.3);
}
.team-stable{
  font-size:clamp(.7rem,3vw,.88rem);
  letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--g);
  font-weight:700;
}
.horse-icon{
  font-size:clamp(2.5rem,10vw,3.8rem);
  filter:brightness(0) invert(1) sepia(1) saturate(20) hue-rotate(70deg) brightness(1.3);
  margin-top:4px;
}
.mid-col{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;padding:10px 6px;
  border-left:1px solid rgba(57,255,20,.15);
  border-right:1px solid rgba(57,255,20,.15);
}
.photo-box{
  width:clamp(52px,13vw,72px);height:clamp(52px,13vw,72px);
  border:2px solid rgba(57,255,20,.35);
  background:rgba(57,255,20,.04);
  border-radius:4px;
}
.vs-text{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(.9rem,4vw,1.2rem);
  color:rgba(57,255,20,.5);
  letter-spacing:.08em;
}

/* ── footer ── */
.footer{
  background:var(--g);
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 14px;
}
.foot-brand{
  font-family:'Bebas Neue',sans-serif;
  font-size:1rem;letter-spacing:.12em;color:#000;
  display:flex;align-items:center;gap:6px;
}
.foot-contact{font-size:.82rem;color:#000;font-weight:700;letter-spacing:.06em}

/* ── share strip ── */
.share-strip{
  background:#060606;
  border-top:1px solid rgba(57,255,20,.12);
  display:flex;gap:8px;justify-content:center;flex-wrap:wrap;
  padding:10px 14px;
}
.share-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(57,255,20,.07);border:1px solid rgba(57,255,20,.25);
  border-radius:100px;padding:7px 16px;
  font-family:'Bebas Neue',sans-serif;font-size:.9rem;letter-spacing:.1em;
  color:var(--g);cursor:pointer;text-decoration:none;
  transition:background .2s,box-shadow .2s;
}
.share-btn:hover{background:rgba(57,255,20,.18);box-shadow:0 0 12px rgba(57,255,20,.3)}
</style>
</head>
<body>

<div class="flyer">
  <canvas id="bgc"></canvas>

  <!-- header -->
  <div class="hdr">
    <div class="hdr-brand">
      <!-- CarrerasOS horse logo mark -->
      <svg width="26" height="26" viewBox="0 0 32 32" fill="none">
        <ellipse cx="16" cy="18" rx="10" ry="7" fill="#000"/>

<script>
/* ── background canvas: neon green speed lines + dust ── */
const bgc = document.getElementById('bgc');
const bx  = bgc.getContext('2d');
const fl  = document.querySelector('.flyer');

function rszBg() { bgc.width = fl.offsetWidth; bgc.height = fl.offsetHeight; }
rszBg();
window.addEventListener('resize', rszBg);

const GREEN = '#39FF14';

/* dust particles */
const dust = [];
for (let i = 0; i < 55; i++) {
  dust.push({
    x: Math.random(),
    y: Math.random(),
    r: Math.random() * 1.2 + .2,
    vx: -(Math.random() * .003 + .001),
    vy: (Math.random() - .5) * .001,
    o: Math.random() * .35 + .05
  });
}

function bgFrame() {
  const W = bgc.width, H = bgc.height;
  bx.clearRect(0, 0, W, H);

  /* faint speed streaks */
  for (let i = 0; i < 8; i++) {
    const y = (i / 8 + .03) * H;
    const len = (Math.random() * .3 + .05) * W;
    const x = Math.random() * W;
    const a = Math.random() * .06 + .01;
    bx.beginPath();
    bx.moveTo(x, y); bx.lineTo(x - len, y);
    bx.strokeStyle = `rgba(57,255,20,${a})`;
    bx.lineWidth = Math.random() * 1 + .3;
    bx.stroke();
  }

  /* dust */
  dust.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0) p.x = 1;
    if (p.y < 0) p.y = 1;
    if (p.y > 1) p.y = 0;
    bx.beginPath();
    bx.arc(p.x * W, p.y * H, p.r, 0, 6.28);
    bx.fillStyle = GREEN;
    bx.globalAlpha = p.o;
    bx.fill();
    bx.globalAlpha = 1;
  });

  requestAnimationFrame(bgFrame);
}
bgFrame();

/* ── track canvas: animated galloping horses ── */
const tc = document.getElementById('tc');
const tx = tc.getContext('2d');

function rszTc() {
  tc.width  = tc.parentElement.offsetWidth;
  tc.height = tc.parentElement.offsetHeight;
}
rszTc();
window.addEventListener('resize', rszTc);

/* horse definition — drawn with bezier curves */
function drawHorse(ctx, cx, cy, scale, flip, legPhase) {
  ctx.save();
  ctx.translate(cx, cy);
  if (flip) ctx.scale(-1, 1);
  ctx.scale(scale, scale);

  const G = '#39FF14';
  ctx.fillStyle = G;
  ctx.shadowColor = G;
  ctx.shadowBlur = 12;

  /* body */
  ctx.beginPath();
  ctx.ellipse(0, 0, 48, 22, -0.08, 0, Math.PI * 2);
  ctx.fill();

  /* neck */
  ctx.beginPath();
  ctx.ellipse(40, -20, 16, 22, 0.55, 0, Math.PI * 2);
  ctx.fill();

  /* head */
  ctx.beginPath();
  ctx.ellipse(56, -36, 18, 12, -0.35, 0, Math.PI * 2);
  ctx.fill();

  /* ear */
  ctx.beginPath();
  ctx.moveTo(60, -46); ctx.lineTo(65, -55); ctx.lineTo(70, -46);
  ctx.closePath(); ctx.fill();

  /* nostril accent */
  ctx.fillStyle = 'rgba(0,0,0,.4)';
  ctx.beginPath();
  ctx.ellipse(70, -33, 4, 3, 0.3, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = G;

  /* tail */
  ctx.beginPath();
  ctx.moveTo(-48, -8);
  ctx.bezierCurveTo(-65, -5, -70, 15, -60, 24);
  ctx.bezierCurveTo(-68, 30, -55, 28, -50, 18);
  ctx.fill();

  /* mane */
  ctx.beginPath();
  ctx.moveTo(38, -38);
  ctx.bezierCurveTo(30, -32, 28, -24, 36, -18);
  ctx.lineWidth = 5; ctx.strokeStyle = G; ctx.stroke();

  /* legs — 4 legs with gallop phase */
  const lp = legPhase;
  const legDefs = [
    { x: -18, base: 22, swing: Math.sin(lp) * 14,       ext: Math.cos(lp) * 6 },
    { x: -4,  base: 22, swing: Math.sin(lp + 1.8) * 14, ext: Math.cos(lp+1.8)*6},
    { x:  10, base: 22, swing: Math.sin(lp + 1.0) * 14, ext: Math.cos(lp+1)*6 },
    { x:  24, base: 22, swing: Math.sin(lp + 2.8) * 14, ext: Math.cos(lp+2.8)*6},
  ];

  legDefs.forEach(leg => {
    const kx = leg.x + leg.swing * .3;
    const ky1 = leg.base;
    const ky2 = leg.base + 20 - Math.abs(leg.ext) * .4;
    const ky3 = leg.base + 38 + leg.ext * .2;

    ctx.beginPath();
    ctx.moveTo(leg.x, ky1);
    ctx.quadraticCurveTo(kx, ky2, kx + leg.swing * .2, ky3);
    ctx.lineWidth = 7; ctx.strokeStyle = G;
    ctx.lineCap = 'round'; ctx.stroke();

    /* hoof */
    ctx.beginPath();
    ctx.ellipse(kx + leg.swing * .2, ky3 + 3, 5, 3, 0, 0, Math.PI * 2);
    ctx.fill();
  });

  /* jockey body */
  ctx.fillStyle = 'rgba(0,0,0,.5)';
  ctx.beginPath();
  ctx.ellipse(22, -36, 8, 12, 0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = G;
  ctx.beginPath();
  ctx.ellipse(22, -36, 6, 10, 0.2, 0, Math.PI * 2);
  ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(0,0,0,.6)'; ctx.stroke();
  /* helmet */
  ctx.fillStyle = 'rgba(0,0,0,.7)';
  ctx.beginPath();
  ctx.ellipse(26, -46, 9, 7, -0.2, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

/* two horses animate across */
const horses = [
  { x: .15, y: .5, spd: .0018, scale: .55, flip: false, phase: 0 },
  { x: .62, y: .48, spd: .0022, scale: .52, flip: true,  phase: 1.4 },
];

let lastT = 0;
function trackFrame(t) {
  const dt = t - lastT; lastT = t;
  const W = tc.width, H = tc.height;
  tx.clearRect(0, 0, W, H);

  horses.forEach(h => {
    h.x += h.spd;
    if (h.x > 1.2) h.x = -.25;
    h.phase += dt * .008;
    drawHorse(tx, h.x * W, h.y * H, h.scale, h.flip, h.phase);
  });

  requestAnimationFrame(trackFrame);
}
requestAnimationFrame(trackFrame);
</script>
</body>
