<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Assistant</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080810;--surface:#0f0f1a;--surface2:#161625;--border:#1e1e32;
  --accent:#8B5CF6;--accent2:#7C3AED;--green:#22C55E;--red:#EF4444;
  --text:#eee;--muted:#555;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,sans-serif;overflow:hidden}

/* ── BACKGROUND ── */
.bg-orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}
.orb1{width:500px;height:500px;top:-100px;left:50%;transform:translateX(-50%);background:radial-gradient(circle,rgba(139,92,246,.15) 0%,transparent 70%)}
.orb2{width:300px;height:300px;bottom:-50px;right:-50px;background:radial-gradient(circle,rgba(236,72,153,.08) 0%,transparent 70%)}

/* ── LAYOUT ── */
.app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;max-width:700px;margin:0 auto;padding:1.5rem}

/* ── HEADER ── */
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-shrink:0}
.logo{display:flex;align-items:center;gap:.6rem}
.logo-ring{
  width:38px;height:38px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),#EC4899);
  display:flex;align-items:center;justify-content:center;font-size:1.1rem;
  box-shadow:0 0 20px rgba(139,92,246,.4);
}
.logo-name{font-size:1.05rem;font-weight:800;letter-spacing:-.01em}
.logo-sub{font-size:.6rem;color:var(--muted);font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.header-right{display:flex;align-items:center;gap:.6rem}
.voice-select{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:.35rem .7rem;font-size:.72rem;outline:none;cursor:pointer}
.clear-btn{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:.35rem .75rem;font-size:.72rem;cursor:pointer;transition:all .15s}
.clear-btn:hover{border-color:var(--red);color:var(--red)}

/* ── CHAT ── */
.chat{flex:1;overflow-y:auto;padding:.5rem 0;display:flex;flex-direction:column;gap:.85rem;scroll-behavior:smooth}
.chat::-webkit-scrollbar{width:4px}
.chat::-webkit-scrollbar-track{background:transparent}
.chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}

.msg{display:flex;gap:.75rem;max-width:90%;animation:msgIn .3s cubic-bezier(.22,1,.36,1) both}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.ai{align-self:flex-start}
@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

.msg-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.95rem}
.msg.user .msg-avatar{background:linear-gradient(135deg,#3B82F6,#8B5CF6)}
.msg.ai .msg-avatar{background:linear-gradient(135deg,var(--accent),#EC4899);box-shadow:0 0 12px rgba(139,92,246,.3)}

.msg-bubble{
  border-radius:16px;padding:.65rem .95rem;font-size:.88rem;line-height:1.65;
  max-width:calc(100% - 44px);
}
.msg.user .msg-bubble{background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.2);border-bottom-right-radius:4px}
.msg.ai .msg-bubble{background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:4px}

.msg-play{
  display:inline-flex;align-items:center;gap:.3rem;margin-top:.4rem;
  font-size:.65rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  color:var(--accent);cursor:pointer;opacity:.7;transition:opacity .15s;border:none;background:none;padding:0;
}
.msg-play:hover{opacity:1}

/* ── TYPING INDICATOR ── */
.typing{display:flex;gap:.3rem;align-items:center;padding:.4rem 0}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:typeDot 1.2s ease-in-out infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes typeDot{0%,60%,100%{transform:scale(.8);opacity:.4}30%{transform:scale(1.1);opacity:1}}

/* ── WAVEFORM ── */
.waveform{display:flex;align-items:center;justify-content:center;gap:3px;height:40px;margin-bottom:.5rem;flex-shrink:0}
.wv-bar{width:3px;height:8px;border-radius:99px;background:var(--accent);opacity:.3;transition:height .08s ease,opacity .08s}
.wv-bar.active{opacity:.9}

/* ── MIC BUTTON ── */
.mic-area{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:.8rem;padding:1rem 0 .5rem}

.mic-btn{
  width:80px;height:80px;border-radius:50%;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--accent),#EC4899);
  font-size:2rem;position:relative;transition:transform .15s,box-shadow .15s;
  box-shadow:0 0 0 0 rgba(139,92,246,.4);
  display:flex;align-items:center;justify-content:center;
}
.mic-btn:hover{transform:scale(1.06);box-shadow:0 0 30px rgba(139,92,246,.5)}
.mic-btn.recording{animation:micPulse 1s ease-in-out infinite;background:linear-gradient(135deg,var(--red),#f97316)}
.mic-btn.thinking{background:linear-gradient(135deg,#0EA5E9,var(--accent));animation:micSpin 2s linear infinite}
@keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.5)}50%{box-shadow:0 0 0 16px rgba(239,68,68,0)}}
@keyframes micSpin{to{filter:hue-rotate(360deg)}}

.mic-label{font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.mic-label.rec{color:var(--red)}
.mic-label.think{color:#0EA5E9}

/* ── TEXT INPUT ── */
.text-row{display:flex;gap:.5rem;width:100%}
.text-input{
  flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);
  border-radius:12px;padding:.65rem 1rem;font-size:.85rem;outline:none;transition:border-color .15s;
  font-family:inherit;
}
.text-input:focus{border-color:var(--accent)}
.text-input::placeholder{color:var(--muted)}
.send-btn{
  background:var(--accent);color:#fff;border:none;border-radius:12px;
  padding:.65rem 1.1rem;font-size:.9rem;cursor:pointer;transition:background .15s;flex-shrink:0;
}
.send-btn:hover{background:var(--accent2)}

/* ── EMPTY STATE ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;text-align:center;gap:.6rem;pointer-events:none}
.empty-icon{font-size:4rem;opacity:.15}
.empty-title{font-size:1.1rem;font-weight:700;opacity:.3}
.empty-sub{font-size:.78rem;color:var(--muted);max-width:250px;line-height:1.7}

/* ── ERROR ── */
.err{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:10px;padding:.75rem 1rem;font-size:.78rem;color:#f87171;margin-bottom:.5rem}
</style>
</head>
<body>
<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>

<div class="app">
  <header>
    <div class="logo">
      <div class="logo-ring">🤖</div>
      <div>
        <div class="logo-name">Voice Assistant</div>
        <div class="logo-sub">GPT-4o · Whisper · TTS</div>
      </div>
    </div>
    <div class="header-right">
      <select class="voice-select" id="voiceSelect">
        <option value="nova">Nova (F)</option>
        <option value="alloy">Alloy</option>
        <option value="echo">Echo (M)</option>
        <option value="fable">Fable (M)</option>
        <option value="onyx">Onyx (M)</option>
        <option value="shimmer">Shimmer (F)</option>
      </select>
      <button class="clear-btn" onclick="clearChat()">Clear</button>
    </div>
  </header>

  <div class="chat" id="chat">
    <div class="empty" id="emptyState">
      <div class="empty-icon">🎙</div>
      <div class="empty-title">Press the mic and speak</div>
      <div class="empty-sub">Or type below. I'll listen, think, and talk back.</div>
    </div>
  </div>

  <div class="waveform" id="waveform">
    <!-- bars injected by JS -->
  </div>

  <div class="mic-area">
    <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎙</button>
    <div class="mic-label" id="micLabel">Hold to speak</div>
    <div class="text-row">
      <input class="text-input" id="textInput" placeholder="Or type here and press Enter…" onkeydown="if(event.key==='Enter')sendText()">
      <button class="send-btn" onclick="sendText()">↑</button>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:9998';
let mediaRecorder, recStream, recChunks = [], recording = false, thinking = false;
let analyser, animId;
let lastAudioB64 = {};

/* ── WAVEFORM BARS ── */
const wv = document.getElementById('waveform');
const BAR_COUNT = 28;
for (let i = 0; i < BAR_COUNT; i++) {
  const b = document.createElement('div'); b.className = 'wv-bar'; wv.appendChild(b);
}
const bars = wv.querySelectorAll('.wv-bar');

function animBars(dataArray) {
  const slice = Math.floor(dataArray.length / BAR_COUNT);
  bars.forEach((b, i) => {
    const val = dataArray[i * slice] / 255;
    const h = 6 + val * 34;
    b.style.height = h + 'px';
    b.classList.toggle('active', val > 0.05);
  });
}

function idleBars() {
  let t = 0;
  cancelAnimationFrame(animId);
  function step() {
    bars.forEach((b, i) => {
      const h = 5 + Math.sin(t * 2 + i * 0.45) * 3;
      b.style.height = h + 'px';
      b.classList.remove('active');
    });
    t += 0.04;
    animId = requestAnimationFrame(step);
  }
  step();
}

function liveBars() {
  cancelAnimationFrame(animId);
  const buf = new Uint8Array(analyser.frequencyBinCount);
  function step() {
    analyser.getByteFrequencyData(buf);
    animBars(buf);
    animId = requestAnimationFrame(step);
  }
  step();
}

idleBars();

/* ── MIC ── */
async function toggleMic() {
  if (thinking) return;
  if (!recording) await startRec();
  else stopRec();
}

async function startRec() {
  try {
    recStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const ctx = new AudioContext();
    analyser = ctx.createAnalyser(); analyser.fftSize = 64;
    ctx.createMediaStreamSource(recStream).connect(analyser);

    recChunks = [];
    mediaRecorder = new MediaRecorder(recStream, { mimeType: 'audio/webm' });
    mediaRecorder.ondataavailable = e => { if (e.data.size) recChunks.push(e.data); };
    mediaRecorder.onstop = processAudio;
    mediaRecorder.start(100);
    recording = true;

    const btn = document.getElementById('micBtn');
    btn.classList.add('recording'); btn.textContent = '⏹';
    document.getElementById('micLabel').textContent = 'Listening… tap to send';
    document.getElementById('micLabel').className = 'mic-label rec';
    liveBars();
  } catch(e) { addError('Microphone error: ' + e.message); }
}

function stopRec() {
  if (!mediaRecorder) return;
  mediaRecorder.stop();
  recStream.getTracks().forEach(t => t.stop());
  recording = false;
  setThinking(true);
}

async function processAudio() {
  const blob = new Blob(recChunks, { type: 'audio/webm' });
  const voice = document.getElementById('voiceSelect').value;
  try {
    const r = await fetch(`${API}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'audio/webm', 'X-Filename': 'audio.webm', 'X-Voice': voice, 'Content-Length': blob.size },
      body: blob
    });
    const j = await r.json();
    if (j.error) throw new Error(j.error);
    if (j.user) {
      addMsg('user', j.user);
      addMsg('ai', j.assistant, j.audio_b64);
      playAudio(j.audio_b64);
    }
  } catch(e) { addError(e.message); }
  setThinking(false);
}

async function sendText() {
  const inp = document.getElementById('textInput');
  const text = inp.value.trim(); if (!text) return;
  inp.value = '';
  const voice = document.getElementById('voiceSelect').value;
  setThinking(true);
  try {
    const r = await fetch(`${API}/text-chat`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ text, voice })
    });
    const j = await r.json();
    if (j.error) throw new Error(j.error);
    addMsg('user', j.user);
    addMsg('ai', j.assistant, j.audio_b64);
    playAudio(j.audio_b64);
  } catch(e) { addError(e.message); }
  setThinking(false);
}

function setThinking(v) {
  thinking = v;
  const btn = document.getElementById('micBtn');
  const lbl = document.getElementById('micLabel');
  if (v) {
    btn.classList.remove('recording'); btn.classList.add('thinking'); btn.textContent = '⏳';
    lbl.textContent = 'Thinking…'; lbl.className = 'mic-label think';
    idleBars();
  } else {
    btn.classList.remove('thinking', 'recording'); btn.textContent = '🎙';
    lbl.textContent = 'Tap to speak'; lbl.className = 'mic-label';
  }
}

/* ── AUDIO ── */
function playAudio(b64) {
  if (!b64) return;
  const audio = new Audio('data:audio/mpeg;base64,' + b64);
  audio.play().catch(()=>{});
}

/* ── CHAT RENDERING ── */
function addMsg(role, text, audiob64) {
  document.getElementById('emptyState').style.display = 'none';
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const id = 'a_' + Date.now();
  if (audiob64) lastAudioB64[id] = audiob64;
  div.innerHTML = `
    <div class="msg-avatar">${role === 'user' ? '👤' : '🤖'}</div>
    <div class="msg-bubble">
      ${esc(text)}
      ${audiob64 ? `<br><button class="msg-play" onclick="playAudio(lastAudioB64['${id}'])">▶ Play again</button>` : ''}
    </div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addError(msg) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'err';
  div.textContent = 'Error: ' + msg;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function clearChat() {
  await fetch(`${API}/clear`);
  document.getElementById('chat').innerHTML = `<div class="empty" id="emptyState"><div class="empty-icon">🎙</div><div class="empty-title">Press the mic and speak</div><div class="empty-sub">Or type below. I'll listen, think, and talk back.</div></div>`;
}

/* ── SPACEBAR shortcut ── */
document.addEventListener('keydown', e => { if (e.code === 'Space' && e.target === document.body && !recording && !thinking) { e.preventDefault(); startRec(); } });
document.addEventListener('keyup', e => { if (e.code === 'Space' && e.target === document.body && recording) { e.preventDefault(); stopRec(); } });
</script>
</body>
</html>
