  <style>
    :root, .sw-root {
      --sw-bg: #F6F1E7;
      --sw-ink: #1A150F;
      --sw-ink-soft: #8F8878;
      --sw-accent: #FF6B00;
      --sw-font-display: 'Bebas Neue', 'Arial Narrow', sans-serif;

    .sw-copy__title{ letter-spacing:.01em; }
    .sw-brand__name{ letter-spacing:.02em; }
    .world-foot{ position:relative; z-index:2; background:var(--sw-bg); text-align:center; padding:3rem 1.25rem 4rem; }
    .world-foot a{ color:#FF6B00; font-weight:700; text-decoration:none; }

    /* ---- extra motion layer: dust + light sweep on top of the scene photos ---- */
    #dust{ position:fixed; inset:0; z-index:15; pointer-events:none; mix-blend-mode:screen; }
    .sweep{ position:fixed; inset:-20% -60%; z-index:14; pointer-events:none; overflow:hidden; }
    .sweep::before{
      content:''; position:absolute; top:0; bottom:0; left:-30%; width:26%;
      background:linear-gradient(100deg, transparent 0%, rgba(255,222,150,.16) 45%, rgba(255,255,255,.22) 50%, rgba(255,222,150,.16) 55%, transparent 100%);
      transform:skewX(-18deg);
      animation: sweepMove 9s ease-in-out infinite;
    }
    @keyframes sweepMove{
      0%   { left:-40%; }
      50%  { left:120%; }
      100% { left:120%; }
    }
    @media (prefers-reduced-motion: reduce){
      #dust, .sweep{ display:none; }
    }
  </style>

  <script>
    /* ---- dust motes: drift constantly, kick harder while scrolling (mimics dust
       kicked up by the scene as you fly past it) ---- */
    (function(){
      const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (reduce) return;
      const cvs = document.getElementById('dust');
      const ctx = cvs.getContext('2d');
      let W, H, DPR = Math.min(window.devicePixelRatio || 1, 2);
      function resize(){
        W = window.innerWidth; H = window.innerHeight;
        cvs.width = W * DPR; cvs.height = H * DPR;
        cvs.style.width = W + 'px'; cvs.style.height = H + 'px';
        ctx.setTransform(DPR,0,0,DPR,0,0);
      }
      resize();
      window.addEventListener('resize', resize);

      const N = 70;
      const seeds = [7,23,41,58,71,88,12,34,52,66,83,95,18,29,47,63,77,91,5,38,55,69,82,97,14,26,43,61,74,89];
      const motes = [];
      for (let i = 0; i < N; i++){
        const s = seeds[i % seeds.length];
        motes.push({
          x: (s * 37 + i * 13) % 100,          // vw %, 0..100
          y: (s * 53 + i * 29) % 100,          // vh %, 0..100
          r: 0.8 + (s % 5) * 0.5,
          drift: 0.15 + (s % 7) * 0.05,         // base upward drift, vh/s-ish
          sway: (s % 10) - 5,                   // horizontal sway amplitude
          phase: s % 100,
          warm: (s % 3 !== 0),
        });
      }

      let lastY = window.scrollY;
      let kick = 0; // extra velocity-driven motion, decays each frame
      window.addEventListener('scroll', () => {
        const y = window.scrollY;
        kick = Math.max(-3, Math.min(3, (y - lastY) * 0.06));
        lastY = y;
      }, { passive:true });

      let t = 0;
      function frame(){
        t += 1;
        ctx.clearRect(0,0,W,H);
        kick *= 0.94; // decay toward 0 between scroll events
        for (const m of motes){
          m.y -= (m.drift + Math.abs(kick)) * 0.06;
          m.x += Math.sin((t + m.phase) * 0.01) * 0.02 + kick * 0.015;
          if (m.y < -2) { m.y = 102; m.x = (m.x + 31) % 100; }
          if (m.x < -2) m.x = 102;
          if (m.x > 102) m.x = -2;
          const px = m.x / 100 * W, py = m.y / 100 * H;
          const alpha = 0.35 + 0.25 * Math.sin((t + m.phase) * 0.02);
          ctx.beginPath();
          ctx.arc(px, py, m.r, 0, Math.PI*2);
          ctx.fillStyle = m.warm
            ? `rgba(255,214,150,${Math.max(0,alpha).toFixed(2)})`
            : `rgba(255,246,224,${Math.max(0,alpha*0.7).toFixed(2)})`;
          ctx.fill();
        }
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    })();
  </script>
