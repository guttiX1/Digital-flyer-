<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  width:540px;height:960px;overflow:hidden;
  background:#000;
  font-family:-apple-system,'SF Pro Display','Helvetica Neue',Arial,sans-serif;
}

/* Letterbox bars */
.bar{
  position:fixed;left:0;right:0;height:78px;background:#000;z-index:100;
}
.bar.top{top:0}
.bar.bot{bottom:0}

/* Background canvas */
#bg{position:absolute;top:0;left:0;width:540px;height:960px;z-index:1}

/* Scene container */
.scene{
  position:absolute;top:78px;left:0;right:0;bottom:78px;
  overflow:hidden;z-index:2;
}

/* Dark red atmospheric glow */
.atmos{
  position:absolute;inset:0;
  background:radial-gradient(ellipse 100% 80% at 40% 60%,
    rgba(180,20,0,.65) 0%,
    rgba(80,5,0,.4) 35%,
    rgba(0,0,0,.9) 70%,
    #000 100%);
  animation:atmospherePulse 3s ease-in-out infinite alternate;
}
@keyframes atmospherePulse{
  from{opacity:.9;transform:scale(1)}
  to{opacity:1;transform:scale(1.03)}
}

/* Stadium bokeh lights */
.bokeh-container{position:absolute;inset:0;overflow:hidden}
.bk{
  position:absolute;border-radius:50%;
  filter:blur(var(--blur));
  animation:bokehFloat var(--dur) ease-in-out infinite alternate;
}
@keyframes bokehFloat{
  from{transform:translate(0,0) scale(1)}
  to{transform:translate(var(--dx),var(--dy)) scale(var(--ds))}
}

/* Horse image */
.horse-wrap{
  position:absolute;
  bottom:-20px;
  left:50%;
  transform:translateX(-50%);
  width:460px;
  animation:horseReveal 1.8s cubic-bezier(.25,.46,.45,.94) forwards,
             horsePan 8s ease-in-out infinite alternate;
  opacity:0;
  transform-origin:bottom center;
}
@keyframes horseReveal{
  from{opacity:0;transform:translateX(-50%) translateY(40px) scale(.92)}
  to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
}
@keyframes horsePan{
  from{transform:translateX(-50%) scale(1)}
  to{transform:translateX(-50%) scale(1.04) translateY(-8px)}
}

.horse-img{
  width:100%;
  filter:
    drop-shadow(0 0 40px rgba(220,60,0,.7))
    drop-shadow(0 0 80px rgba(180,20,0,.4))
    drop-shadow(0 20px 40px rgba(0,0,0,.95));
}

/* Text overlays */
.name-wrap{
  position:absolute;
  bottom:100px;
  left:0;right:0;
  text-align:center;
  z-index:10;
}
.cuadra-text{
  font-size:11px;
  letter-spacing:6px;
  color:rgba(245,197,24,.8);
  text-transform:uppercase;
  font-weight:700;
  opacity:0;
  animation:textUp 1s ease forwards;
  animation-delay:1.5s;
}
.horse-name{
  font-size:54px;
  font-weight:900;
  letter-spacing:2px;
  text-transform:uppercase;
  color:#fff;
  line-height:.95;
  text-shadow:
    0 0 60px rgba(255,60,0,.8),
    0 0 120px rgba(200,20,0,.5),
    0 4px 20px rgba(0,0,0,1);
  opacity:0;
  animation:nameReveal 1.2s cubic-bezier(.25,.46,.45,.94) forwards;
  animation-delay:1.8s;
}
.record-text{
  font-size:13px;
  letter-spacing:4px;
  color:rgba(255,200,100,.9);
  font-weight:700;
  margin-top:6px;
  opacity:0;
  animation:textUp 1s ease forwards;
  animation-delay:2.3s;
}
.streak-text{
  font-size:10px;
  letter-spacing:3px;
  color:rgba(255,140,80,.7);
  font-weight:600;
  text-transform:uppercase;
  margin-top:4px;
  opacity:0;
  animation:textUp 1s ease forwards;
  animation-delay:2.7s;
}
@keyframes nameReveal{
  from{opacity:0;transform:translateY(20px) scale(.96)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
@keyframes textUp{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}

/* Embers canvas */
#embers{position:absolute;inset:0;z-index:8;pointer-events:none}

/* Left edge red gradient slash */
.slash{
  position:absolute;top:0;bottom:0;left:0;width:6px;
  background:linear-gradient(180deg,transparent 0%,#cc2200 30%,#cc2200 70%,transparent 100%);
  box-shadow:0 0 20px rgba(204,34,0,.8);
  opacity:0;
  animation:slashIn 1s ease forwards;
  animation-delay:.8s;
}
@keyframes slashIn{
  from{opacity:0;height:0}
  to{opacity:1;height:100%}
}

/* Top badge */
.top-badge{
  position:absolute;top:16px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.6);
  border:1px solid rgba(245,197,24,.4);
  border-radius:30px;
  padding:5px 18px;
  font-size:9px;
  letter-spacing:4px;
  color:#F5C518;
  text-transform:uppercase;
  font-weight:700;
  white-space:nowrap;
  opacity:0;
  animation:textUp 1s ease forwards;
  animation-delay:.5s;
}

/* Fade-in overlay for dramatic enter */
.fade-in{
  position:absolute;inset:0;background:#000;z-index:50;
  animation:fadeAway 1s ease forwards;
  animation-delay:.1s;
}
@keyframes fadeAway{
  from{opacity:1}
  to{opacity:0;pointer-events:none}
}
</style>
</head>

<!-- Black fade-in overlay -->
<div class="fade-in"></div>

<script>
/* ── BACKGROUND CANVAS ── */
const bgCanvas = document.getElementById('bg');
bgCanvas.width = 540; bgCanvas.height = 960;
const bgCtx = bgCanvas.getContext('2d');

/* ── BOKEH LIGHTS ── */
const bokehContainer = document.getElementById('bokehContainer');
const bokehColors = ['rgba(255,80,0,.15)','rgba(255,160,0,.1)','rgba(200,40,0,.12)','rgba(255,200,50,.08)'];
for(let i = 0; i < 18; i++) {
  const bk = document.createElement('div');
  bk.className = 'bk';
  const size = 20 + Math.random()*80;
  bk.style.cssText = `
    width:${size}px;height:${size}px;
    left:${Math.random()*100}%;top:${Math.random()*100}%;
    background:${bokehColors[Math.floor(Math.random()*bokehColors.length)]};
    --blur:${8+Math.random()*30}px;
    --dur:${3+Math.random()*5}s;
    --dx:${(Math.random()-0.5)*30}px;
    --dy:${(Math.random()-0.5)*20}px;
    --ds:${0.8+Math.random()*.5};
    animation-delay:${-Math.random()*5}s;
  `;
  bokehContainer.appendChild(bk);
}

/* ── EMBERS / SPARKS ── */
const ec = document.getElementById('embers');
const ex = ec.getContext('2d');
const embers = Array.from({length:50},()=>{
  return {
    x: Math.random()*540,
    y: 200 + Math.random()*604,
    vx: (Math.random()-.5)*.4,
    vy: -Math.random()*.8 - .3,
    life: Math.random(),
    maxLife: .6+Math.random()*.4,
    r: Math.random()*2.5+.5,
    col: `hsl(${20+Math.random()*30},100%,${60+Math.random()*30}%)`,
  };
});
(function tickEmbers(){
  ex.clearRect(0,0,540,804);
  embers.forEach(e=>{
    e.x+=e.vx; e.y+=e.vy; e.life-=.008;
    if(e.life<=0){
      e.x=Math.random()*540; e.y=804; e.life=e.maxLife;
      e.vx=(Math.random()-.5)*.4; e.vy=-Math.random()*.8-.3;
    }
    const a = e.life/e.maxLife;
    ex.beginPath();
    ex.arc(e.x,e.y,e.r,0,6.28);
    ex.fillStyle=e.col;
    ex.globalAlpha=a*.8;
    ex.fill();
    // Glow
    ex.beginPath();
    ex.arc(e.x,e.y,e.r*2.5,0,6.28);
    ex.fillStyle=e.col;
    ex.globalAlpha=a*.15;
    ex.fill();
  });
  ex.globalAlpha=1;
  requestAnimationFrame(tickEmbers);
})();
</script>
