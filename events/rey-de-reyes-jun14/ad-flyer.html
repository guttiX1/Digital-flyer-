<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fff}
.wrap{position:relative;display:inline-block;width:100%}
img.flyer{width:100%;display:block}
.qr{
  position:absolute;
  bottom:16px;right:16px;
  background:#fff;
  padding:5px;
  border-radius:6px;
  border:3px solid #FFD200;
  box-shadow:0 2px 12px rgba(0,0,0,.4);
}
.qr img{width:88px;height:88px;display:block}
</style>
</head>
<body>
<div class="wrap">
  <img class="flyer" src="flyer.jpg" alt="El Rey de Reyes">
  <div class="qr">
    <img id="qr" src="" alt="QR">
  </div>
</div>
<script>
const url='https://guttix1.github.io/Digital-flyer-/events/rey-de-reyes-jun14/races.html';
document.getElementById('qr').src=`https://api.qrserver.com/v1/create-qr-code/?size=176x176&data=${encodeURIComponent(url)}&bgcolor=FFFFFF&color=000000&format=png&margin=4`;
</script>
</body>
</html>
