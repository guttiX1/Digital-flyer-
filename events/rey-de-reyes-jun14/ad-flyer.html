<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=540">
<title>Flyer — El Rey de Reyes</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#000;display:flex;justify-content:center}
  .poster{width:540px;position:relative;flex-shrink:0}
  .poster img.flyer{width:100%;display:block}
  .qr-corner{
    position:absolute;
    bottom:18px;right:18px;
    background:#fff;
    padding:6px;
    border-radius:8px;
    border:3px solid #FFD200;
    box-shadow:0 4px 20px rgba(0,0,0,.6);
  }
  .qr-corner img{width:90px;height:90px;display:block;border-radius:4px}
</style>
</head>
<body>
<div class="poster">
  <img class="flyer" src="flyer.jpg" alt="El Rey de Reyes">
  <div class="qr-corner">
    <img id="qr" src="" alt="QR">
  </div>
</div>
<script>
  const URL = 'https://guttix1.github.io/Digital-flyer-/events/rey-de-reyes-jun14/races.html';
  document.getElementById('qr').src =
    `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(URL)}&bgcolor=FFFFFF&color=000000&format=png&margin=4`;
</script>
</body>
</html>
