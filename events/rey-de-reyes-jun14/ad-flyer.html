<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>El Rey de Reyes · Mis Picks</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{background:#080808;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;min-height:100vh;padding-bottom:100px}

/* ── HERO ── */
.hero{
  position:relative;width:100%;
  aspect-ratio:9/14;
  max-height:85vh;
  overflow:hidden;
}
.hero img.flyer{
  width:100%;height:100%;
  object-fit:cover;object-position:top center;
  display:block;
}
.hero-fade{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,
    transparent 50%,
    rgba(8,8,8,.6) 75%,
    #080808 100%);
}
.hero-bottom{
  position:absolute;bottom:0;left:0;right:0;
  padding:20px 20px 24px;
  text-align:center;
}
.picks-live-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,210,0,.12);
  border:1px solid rgba(255,210,0,.35);
  border-radius:20px;
  padding:6px 14px;
  font-size:12px;font-weight:700;
  color:#FFD200;letter-spacing:.5px;
  margin-bottom:12px;
  cursor:pointer;
  transition:background .2s;
}
.picks-live-badge:hover{background:rgba(255,210,0,.2)}
.picks-live-badge .dot{
  width:7px;height:7px;border-radius:50%;
  background:#FFD200;
  animation:pulse 1.4s infinite;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.hero-label{
  font-size:11px;letter-spacing:3px;text-transform:uppercase;
  color:rgba(255,255,255,.5);margin-bottom:4px;
}
.scroll-hint{
  font-size:11px;color:rgba(255,255,255,.35);letter-spacing:1px;
  animation:bob .9s ease-in-out infinite alternate;
  margin-top:10px;
}
@keyframes bob{from{transform:translateY(0)}to{transform:translateY(4px)}}

/* ── SECTION HEADER ── */
.section-head{
  padding:24px 18px 10px;
  display:flex;align-items:center;gap:10px;
}
.section-head h2{
  font-size:11px;letter-spacing:3px;text-transform:uppercase;
  color:#FFD200;font-weight:800;
}
.section-head::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,rgba(255,210,0,.3),transparent);
}

/* ── RACE CARDS ── */
.races{padding:0 14px;display:flex;flex-direction:column;gap:10px}

.race-card{
  background:#111;
  border:1px solid rgba(255,255,255,.07);
  border-radius:14px;
  overflow:hidden;
  transition:border-color .25s;
}
.race-card.picked{border-color:rgba(255,210,0,.4)}

.race-meta{
  display:flex;align-items:center;gap:0;
  padding:8px 14px 6px;
  border-bottom:1px solid rgba(255,255,255,.05);
}
.race-num-badge{
  font-size:10px;font-weight:900;color:#FFD200;
  letter-spacing:.5px;margin-right:8px;
}
.race-card.estelar .race-num-badge{color:#FFD200}
.race-type{font-size:10px;color:rgba(255,255,255,.35);letter-spacing:1px;text-transform:uppercase}
.race-dist{margin-left:auto;font-size:10px;color:rgba(255,255,255,.3);letter-spacing:.3px}

.horses-row{
  display:grid;grid-template-columns:1fr auto 1fr;
  gap:0;
}

.pick-btn{
  display:flex;flex-direction:column;align-items:center;
  padding:14px 10px 12px;
  cursor:pointer;
  position:relative;
  transition:background .2s;
  border:none;background:transparent;color:inherit;
  width:100%;
  -webkit-appearance:none;
}
.pick-btn:active{background:rgba(255,255,255,.04)}

.pick-btn .horse-img-wrap{
  width:72px;height:72px;
  border-radius:50%;
  overflow:hidden;
  background:#1e1e1e;
  border:2.5px solid rgba(255,255,255,.1);
  margin-bottom:8px;
  transition:border-color .25s,transform .2s;
  flex-shrink:0;
}
.pick-btn .horse-img-wrap img{
  width:100%;height:100%;
  object-fit:cover;object-position:top center;
}
.pick-btn .horse-name{
  font-size:11px;font-weight:800;text-transform:uppercase;
  color:#fff;text-align:center;line-height:1.2;
  letter-spacing:.3px;
  transition:color .2s;
}
.pick-btn .horse-cuadra{
  font-size:9px;color:rgba(255,255,255,.35);
  text-align:center;margin-top:3px;
  text-transform:uppercase;letter-spacing:.5px;
}
.pick-indicator{
  width:20px;height:20px;border-radius:50%;
  border:2px solid rgba(255,255,255,.15);
  margin-top:8px;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
  flex-shrink:0;
}
.pick-indicator svg{opacity:0;transition:opacity .15s}

/* SELECTED STATE */
.pick-btn.selected .horse-img-wrap{
  border-color:#FFD200;
  transform:scale(1.05);
  box-shadow:0 0 16px rgba(255,210,0,.35);
}
.pick-btn.selected .horse-name{color:#FFD200}
.pick-btn.selected .pick-indicator{
  border-color:#FFD200;background:#FFD200;
}
.pick-btn.selected .pick-indicator svg{opacity:1}

/* DIMMED (other horse) */
.pick-btn.dimmed .horse-img-wrap{opacity:.35;filter:grayscale(.5)}
.pick-btn.dimmed .horse-name{color:rgba(255,255,255,.35)}
.pick-btn.dimmed .pick-indicator{opacity:.3}

/* VS divider */
.vs-divider{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:0 4px;
  position:relative;
}
.vs-divider::before,.vs-divider::after{
  content:'';position:absolute;left:50%;width:1px;
  background:rgba(255,255,255,.07);
}
.vs-divider::before{top:0;height:38%}
.vs-divider::after{bottom:0;height:38%}
.vs-label{
  font-size:9px;font-weight:900;color:rgba(255,255,255,.25);
  letter-spacing:1.5px;writing-mode:vertical-lr;
}

/* estelar card */
.race-card.estelar{border-color:rgba(255,210,0,.2);background:#111008}
.race-card.estelar .race-meta{border-bottom-color:rgba(255,210,0,.1)}
.estelar-tag{
  font-size:8px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;
  background:#FFD200;color:#000;
  padding:2px 7px;border-radius:10px;margin-left:8px;
}

/* ── MY PICKS PANEL ── */
.my-picks-section{
  margin:28px 14px 0;
  background:#111;
  border:1px solid rgba(255,210,0,.25);
  border-radius:16px;
  overflow:hidden;
}
.my-picks-header{
  background:linear-gradient(135deg,rgba(255,210,0,.15),rgba(255,149,0,.08));
  padding:14px 18px;
  display:flex;align-items:center;gap:10px;
  border-bottom:1px solid rgba(255,210,0,.15);
}
.my-picks-header svg{width:20px;height:20px;flex-shrink:0}
.my-picks-header h3{
  font-size:13px;font-weight:900;letter-spacing:.5px;
  text-transform:uppercase;color:#FFD200;
}
.picks-count{
  margin-left:auto;
  font-size:10px;font-weight:700;
  color:rgba(255,210,0,.6);
  letter-spacing:1px;
}

.picks-list{padding:10px 18px 16px}
.pick-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 0;
  border-bottom:1px solid rgba(255,255,255,.04);
}
.pick-item:last-child{border-bottom:none}
.pick-item .pnum{
  font-size:10px;font-weight:800;color:#FFD200;
  opacity:.7;min-width:20px;
}
.pick-item .pname{
  font-size:12px;font-weight:800;text-transform:uppercase;
  color:#fff;letter-spacing:.3px;flex:1;
}
.pick-item .pname.empty{
  color:rgba(255,255,255,.2);font-weight:400;
  font-size:11px;letter-spacing:.5px;text-transform:none;
}
.pick-item .pcuadra{
  font-size:9px;color:rgba(255,210,0,.6);
  text-transform:uppercase;letter-spacing:.5px;
}
.checkmark{
  width:18px;height:18px;border-radius:50%;
  background:#FFD200;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;opacity:0;transition:opacity .2s;
}
.pick-item.has-pick .checkmark{opacity:1}
.pick-item.has-pick .pname{color:#FFD200}

.picks-empty-state{
  text-align:center;padding:20px;
  font-size:11px;color:rgba(255,255,255,.25);
  letter-spacing:1px;text-transform:uppercase;
  display:none;
}

/* share strip */
.share-strip{
  margin:16px 14px 0;
  background:linear-gradient(135deg,#FFD200,#FF9500);
  border-radius:12px;
  padding:14px 18px;
  display:flex;align-items:center;gap:12px;
  cursor:pointer;
  transition:opacity .15s;
}
.share-strip:active{opacity:.85}
.share-strip .share-icon{font-size:22px;flex-shrink:0}
.share-strip .share-text h4{
  font-size:13px;font-weight:900;text-transform:uppercase;
  color:#000;letter-spacing:.5px;
}
.share-strip .share-text p{
  font-size:10px;color:rgba(0,0,0,.55);margin-top:2px;letter-spacing:.3px;
}
.share-strip .share-arrow{
  margin-left:auto;font-size:18px;color:rgba(0,0,0,.4);
}

/* ── QR SECTION ── */
.qr-section{
  margin:16px 14px 0;
  background:#111;
  border:1px solid rgba(255,255,255,.07);
  border-radius:14px;
  padding:18px;
  display:flex;align-items:center;gap:16px;
}
.qr-img-wrap{
  flex-shrink:0;
  background:#fff;padding:5px;
  border-radius:8px;
  border:2.5px solid #FFD200;
}
.qr-img-wrap img{width:80px;height:80px;display:block;border-radius:3px}
.qr-text h4{
  font-size:13px;font-weight:900;color:#FFD200;
  text-transform:uppercase;letter-spacing:.3px;
  margin-bottom:5px;
}
.qr-text p{font-size:10px;color:rgba(255,255,255,.4);line-height:1.55}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:#FFD200;color:#000;
  font-size:12px;font-weight:800;
  letter-spacing:.5px;text-transform:uppercase;
  padding:10px 20px;border-radius:30px;
  box-shadow:0 8px 32px rgba(255,210,0,.3);
  opacity:0;pointer-events:none;
  transition:all .3s;
  white-space:nowrap;
  z-index:999;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── FOOTER ── */
.footer{
  background:#FFD200;
  margin:20px 14px 0;
  border-radius:10px;
  padding:8px 16px;
  display:flex;justify-content:space-between;align-items:center;
}
.footer span{font-size:9px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;color:rgba(0,0,0,.6)}
.footer strong{font-size:11px;font-weight:900;color:#000}
</style>
</head>
<body>

<!-- HERO: original flyer full-bleed -->
<div class="hero">
  <img class="flyer" src="flyer.jpg" alt="El Rey de Reyes de la Montaña">
  <div class="hero-fade"></div>
  <div class="hero-bottom">
    <div class="picks-live-badge" onclick="document.querySelector('.my-picks-section').scrollIntoView({behavior:'smooth'})">
      <span class="dot"></span>
      <span id="badgeText">Selecciona tu Pick</span>
    </div>
    <div class="scroll-hint">▾ Escoge tus caballos</div>
  </div>
</div>

<!-- RACE PICKERS -->
<div class="section-head">
  <h2>Elige tu Ganador</h2>
</div>

<div class="races" id="raceList"></div>

<!-- MY PICKS -->
<div class="my-picks-section" id="myPicksSection">
  <div class="my-picks-header">
    <svg viewBox="0 0 24 24" fill="none">
      <path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" stroke="#FFD200" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <h3>Mis Picks</h3>
    <span class="picks-count" id="picksCount">0 / 10</span>
  </div>
  <div class="picks-list" id="picksList"></div>
</div>

<!-- SHARE -->
<div class="share-strip" onclick="sharepicks()">
  <span class="share-icon">🏆</span>
  <div class="share-text">
    <h4>Comparte tus Picks</h4>
    <p>Presiona para compartir tu tarjeta de picks</p>
  </div>
  <span class="share-arrow">›</span>
</div>

<!-- QR -->
<div class="qr-section">
  <div class="qr-img-wrap">
    <img id="qrImg" src="" alt="QR Code">
  </div>
  <div class="qr-text">
    <h4>Programa Completo</h4>
    <p>Escanea para ver todos los caballos y estadísticas en tu celular</p>
  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  <span>La Pista · Colorado</span>
  <strong>Dom · Jun 14, 2026</strong>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const RACES = [
  {num:1,h1:'Poca Luz',c1:'Cdra. Ramirez',h2:'Chiklin',c2:'Cdra. Con Chuy',dist:'137 yds',img1:'cuadra-mtz.jpg',img2:'cristo-rey.jpg'},
  {num:2,h1:'Calcamonia',c1:'Cdra. El Alazan',h2:'Valentina',c2:'Cdra. 3 Hermanos',dist:'219 yds',img1:'la-reyna.jpg',img2:'cuadra-esperanza.jpg'},
  {num:3,h1:'Aguila',c1:'Cdra. Con Chuy',h2:'Black Jack',c2:'Cdra. Con Chuy',dist:'164 yds',img1:'cristo-rey.jpg',img2:'la-tepada.jpg'},
  {num:4,h1:'Dramatica',c1:'Cdra. Ramirez',h2:'Viejito',c2:'Cdra. Cafetero',dist:'164 yds',img1:'la-reyna.jpg',img2:'cuadra-mtz.jpg'},
  {num:5,h1:'Volcan',c1:'Cdra. Cafetero',h2:'Ema',c2:'Cdra. GDA',dist:'219 yds',img1:'gutierrez.jpg',img2:'cuadra-esperanza.jpg'},
  {num:6,h1:'Pico Blanco',c1:'Cdra. Cafetero',h2:'Cañero',c2:'Cdra. Con Chuy',dist:'328 yds',img1:'el-chigon.jpg',img2:'cuadra-mtz.jpg'},
  {num:7,h1:'CAOS',c1:'Cdra. Charly',h2:'REY PUERRO',c2:'Cdra. Charly',dist:'246×273 yds',img1:'la-mami.jpg',img2:'aries.jpg',estelar:true},
  {num:8,h1:'Rayito',c1:'Cdra. Chichinero',h2:'Trakalosa',c2:'Cdra. GDA',dist:'273 yds',img1:'la-tepada.jpg',img2:'pisces.jpg'},
  {num:9,h1:'Secreto',c1:'Cdra. Charly',h2:'Cantinelas',c2:'',dist:'219 yds',img1:'pisces.jpg',img2:'gutierrez.jpg'},
  {num:10,h1:'Tigre Real',c1:'Cdra. El Rey',h2:'Montañes',c2:'Cdra. La Montaña',dist:'180 yds',img1:'aries.jpg',img2:'la-mami.jpg'}
];

const picks = {}; // {raceNum: {name, cuadra, side}}

function buildRaces() {
  const container = document.getElementById('raceList');
  RACES.forEach(r => {
    const card = document.createElement('div');
    card.className = 'race-card' + (r.estelar ? ' estelar' : '');
    card.id = `race-${r.num}`;

    card.innerHTML = `
      <div class="race-meta">
        <span class="race-num-badge">C · ${r.num}</span>
        <span class="race-type">${r.estelar ? 'La Estelar' : 'Carrera'}</span>
        ${r.estelar ? '<span class="estelar-tag">★ Estelar</span>' : ''}
        <span class="race-dist">${r.dist}</span>
      </div>
      <div class="horses-row">
        <button class="pick-btn" id="btn-${r.num}-1" onclick="pick(${r.num},1)">
          <div class="horse-img-wrap">
            <img src="${r.img1}" alt="${r.h1}" loading="lazy">
          </div>
          <div class="horse-name">${r.h1}</div>
          <div class="horse-cuadra">${r.c1}</div>
          <div class="pick-indicator">
            <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
              <path d="M1 4l2.5 2.5L9 1" stroke="#000" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </button>
        <div class="vs-divider"><span class="vs-label">VS</span></div>
        <button class="pick-btn" id="btn-${r.num}-2" onclick="pick(${r.num},2)">
          <div class="horse-img-wrap">
            <img src="${r.img2}" alt="${r.h2}" loading="lazy">
          </div>
          <div class="horse-name">${r.h2}</div>
          <div class="horse-cuadra">${r.c2}</div>
          <div class="pick-indicator">
            <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
              <path d="M1 4l2.5 2.5L9 1" stroke="#000" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </button>
      </div>
    `;
    container.appendChild(card);
  });
}

function pick(raceNum, side) {
  const r = RACES.find(x => x.num === raceNum);
  const isRePick = picks[raceNum]?.side === side;

  if (isRePick) {
    // deselect
    delete picks[raceNum];
    document.getElementById(`btn-${raceNum}-1`).classList.remove('selected','dimmed');
    document.getElementById(`btn-${raceNum}-2`).classList.remove('selected','dimmed');
    document.getElementById(`race-${raceNum}`).classList.remove('picked');
  } else {
    picks[raceNum] = {
      name: side === 1 ? r.h1 : r.h2,
      cuadra: side === 1 ? r.c1 : r.c2,
      side
    };
    const btn1 = document.getElementById(`btn-${raceNum}-1`);
    const btn2 = document.getElementById(`btn-${raceNum}-2`);
    btn1.classList.toggle('selected', side === 1);
    btn1.classList.toggle('dimmed', side === 2);
    btn2.classList.toggle('selected', side === 2);
    btn2.classList.toggle('dimmed', side === 1);
    document.getElementById(`race-${raceNum}`).classList.add('picked');
    showToast(`★ ${picks[raceNum].name}`);
  }

  updatePicks();
}

function updatePicks() {
  const count = Object.keys(picks).length;
  document.getElementById('picksCount').textContent = `${count} / 10`;
  document.getElementById('badgeText').textContent =
    count === 0 ? 'Selecciona tu Pick' :
    count === 10 ? '¡Picks Completos! 🏆' :
    `${count} de 10 Picks`;

  const list = document.getElementById('picksList');
  list.innerHTML = '';

  RACES.forEach(r => {
    const p = picks[r.num];
    const item = document.createElement('div');
    item.className = 'pick-item' + (p ? ' has-pick' : '');
    item.innerHTML = `
      <span class="pnum">${r.num}</span>
      <span class="pname${p ? '' : ' empty'}">${p ? p.name : '— Sin selección'}</span>
      ${p ? `<span class="pcuadra">${p.cuadra}</span>` : ''}
      <div class="checkmark">
        <svg width="9" height="7" viewBox="0 0 9 7" fill="none">
          <path d="M1 3.5l2 2L8 1" stroke="#000" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    `;
    list.appendChild(item);
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 1600);
}

function sharepicks() {
  const count = Object.keys(picks).length;
  if (count === 0) { showToast('¡Elige tus picks primero!'); return; }
  let text = '🐎 Mis Picks — El Rey de Reyes de la Montaña\n📅 Jun 14, 2026 · La Pista, Colorado\n\n';
  RACES.forEach(r => {
    const p = picks[r.num];
    text += `C${r.num}: ${p ? '★ ' + p.name : '—'}\n`;
  });
  text += '\nhttps://guttix1.github.io/Digital-flyer-/events/rey-de-reyes-jun14/races.html';
  if (navigator.share) {
    navigator.share({title:'Mis Picks · Rey de Reyes',text}).catch(()=>{});
  } else {
    navigator.clipboard.writeText(text).then(() => showToast('¡Copiado al portapapeles!')).catch(()=>{});
  }
}

// QR code
const SITE = 'https://guttix1.github.io/Digital-flyer-/events/rey-de-reyes-jun14/races.html';
document.getElementById('qrImg').src =
  `https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=${encodeURIComponent(SITE)}&bgcolor=FFFFFF&color=000000&format=png&margin=3`;

buildRaces();
updatePicks();
</script>
</body>
</html>
