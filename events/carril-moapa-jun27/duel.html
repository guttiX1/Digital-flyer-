<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>El Noveno vs Chino Antrax · Gran Estelar · Carril Moapa</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#fff;font-family:'Oswald',sans-serif;min-height:100vh;display:flex;align-items:flex-start;justify-content:center}
.wrap{width:100%;max-width:500px;background:#0a0a0a;min-height:100vh}

/* Header strip */
.header{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;border-bottom:1px solid rgba(245,197,24,.2)}
.header-left,.header-right{font-family:'Bebas Neue',sans-serif;font-size:13px;color:#F5C518;letter-spacing:2px}

/* Event label */
.event-label{text-align:center;padding:20px 16px 4px}
.gran-estelar{font-family:'Bebas Neue',sans-serif;font-size:58px;color:#F5C518;line-height:1;animation:glow 2.5s ease-in-out infinite}
.event-subtitle{font-size:12px;color:rgba(255,255,255,.4);letter-spacing:3px;margin-top:4px}

/* Badges */
.badges{display:flex;justify-content:center;gap:8px;padding:12px 16px;flex-wrap:wrap}
.badge{border:1px solid #F5C518;color:#F5C518;background:transparent;font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:1px;padding:4px 12px;border-radius:50px}

/* Duel arena */
.duel-arena{display:flex;align-items:flex-end;gap:0;height:300px;position:relative;overflow:hidden}
.horse-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;text-align:center;height:100%;position:relative}
.horse-col img{width:100%;height:260px;object-fit:cover;object-position:center top}
.horse-col.left img{animation:float 2.5s ease-in-out infinite}
.horse-col.right img{transform:scaleX(-1);animation:float 2.5s ease-in-out 1.2s infinite}
.horse-name{font-family:'Bebas Neue',sans-serif;font-size:22px;color:#F5C518;letter-spacing:1px;padding:6px 4px 2px;background:linear-gradient(to top,#0a0a0a 70%,transparent);width:100%}
.horse-cuadra{font-size:11px;color:rgba(255,255,255,.4);letter-spacing:1px;padding-bottom:8px;background:#0a0a0a;width:100%}

/* VS center */
.vs-center{flex-shrink:0;width:90px;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:8px;z-index:2;position:relative}
.fire-top,.fire-bottom{font-size:24px;line-height:1}
.vs-circle{width:70px;height:70px;border-radius:50%;background:#F5C518;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:32px;color:#000;animation:pulse 1.5s ease-in-out infinite;box-shadow:0 0 30px rgba(245,197,24,.4)}
.vs-race{font-size:10px;color:rgba(255,255,255,.35);letter-spacing:2px;margin-top:4px}

/* Countdown */
.countdown-box{background:rgba(255,255,255,.04);border:1px solid rgba(245,197,24,.15);border-radius:12px;padding:16px 20px;margin:16px}
.cd-label{font-size:11px;letter-spacing:3px;color:#F5C518;text-align:center;margin-bottom:8px}
.cd-display{font-family:'Bebas Neue',sans-serif;font-size:48px;color:#fff;text-align:center;letter-spacing:4px;line-height:1}

/* Pick buttons */
.pick-row{display:flex;gap:12px;padding:0 16px;margin-top:12px}
.pick-btn{flex:1;border:2px solid #F5C518;color:#F5C518;background:transparent;border-radius:10px;padding:16px 8px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;cursor:pointer;transition:background .2s,color .2s,opacity .2s;-webkit-tap-highlight-color:transparent}
.pick-btn.picked{background:#F5C518;color:#000}
.pick-btn.dimmed{opacity:.4}

/* QR */
.qr-section{text-align:center;padding:20px 16px;border-top:1px solid rgba(255,255,255,.06);margin-top:16px}
.qr-title{font-family:'Bebas Neue',sans-serif;font-size:18px;color:#fff;letter-spacing:3px;margin-bottom:12px}
.qr-img-wrap{width:128px;height:128px;background:#fff;border-radius:8px;padding:4px;display:inline-flex;align-items:center;justify-content:center}
.qr-img-wrap img{width:100%;height:100%;border-radius:4px}
.qr-sub{font-size:11px;color:rgba(255,255,255,.3);margin-top:8px;letter-spacing:1px}

/* Fire row */
.fire-row{text-align:center;padding:12px;font-size:22px}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#F5C518;color:#000;font-weight:800;font-size:13px;letter-spacing:1px;padding:10px 24px;border-radius:8px;opacity:0;transition:opacity .3s;z-index:999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

/* Animations */
@keyframes glow{
  0%,100%{text-shadow:0 0 20px rgba(245,197,24,.4),0 0 60px rgba(245,197,24,.15)}
  50%{text-shadow:0 0 40px rgba(245,197,24,1),0 0 100px rgba(245,197,24,.6),0 0 180px rgba(245,197,24,.3)}
}
@keyframes pulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.06)}
}
@keyframes float{
  0%,100%{transform:translateY(-8px)}
  50%{transform:translateY(8px)}
}
</style>
</head>
<body>
<div class="wrap">

  <!-- Header strip -->
  <div class="header">
    <div class="header-left">CARRIL MOAPA</div>
    <div class="header-right">1:00 PM</div>
  </div>

  <!-- Event label -->
  <div class="event-label">
    <div class="gran-estelar">GRAN ESTELAR</div>
    <div class="event-subtitle">SÁBADO 27 DE JUNIO · 2026</div>
  </div>

  <!-- Badges -->
  <div class="badges">
    <div class="badge">325 YARDAS</div>
    <div class="badge">CDA MISIONERO</div>
    <div class="badge">CDA TREBOL/SANDOVAL</div>
  </div>

  <!-- Main duel arena -->
  <div class="duel-arena">
    <!-- Left horse -->
    <div class="horse-col left">
      <img src="h-caos.jpg" alt="El Noveno">
      <div class="horse-name">EL NOVENO</div>
      <div class="horse-cuadra">CDA MISIONERO</div>
    </div>

    <!-- VS center -->
    <div class="vs-center">
      <div class="fire-top">🔥</div>
      <div class="vs-circle">VS</div>
      <div class="vs-race">R.10</div>
      <div class="fire-bottom">🔥</div>
    </div>

    <!-- Right horse -->
    <div class="horse-col right">
      <img src="h-rey-puerro.jpg" alt="Chino Antrax">
      <div class="horse-name">CHINO ANTRAX</div>
      <div class="horse-cuadra">CDA TREBOL/SANDOVAL</div>
    </div>
  </div>

  <!-- Live countdown -->
  <div class="countdown-box">
    <div class="cd-label">TIEMPO AL INICIO:</div>
    <div class="cd-display" id="cdDisplay">00:00:00</div>
  </div>

  <!-- Pick buttons -->
  <div class="pick-row">
    <button class="pick-btn" id="btnLeft" onclick="doPick('left')">PICO EL NOVENO</button>
    <button class="pick-btn" id="btnRight" onclick="doPick('right')">PICO CHINO ANTRAX</button>
  </div>

  <!-- QR section -->
  <div class="qr-section">
    <div class="qr-title">VER TODOS LOS PICKS</div>
    <div class="qr-img-wrap">
      <img id="qr" src="" alt="QR Picks">
    </div>
    <div class="qr-sub">13 carreras · picks gratis</div>
  </div>

  <!-- Bottom fire row -->
  <div class="fire-row">🔥 🐎 🔥 🐎 🔥</div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// QR code
const url='https://guttix1.github.io/Digital-flyer-/events/carril-moapa-jun27/picks.html';
document.getElementById('qr').src=`https://api.qrserver.com/v1/create-qr-code/?size=240x240&data=${encodeURIComponent(url)}&bgcolor=0a0a0a&color=F5C518&format=png&margin=4`;

// Countdown
function updateCD(){
  const target=new Date('2026-06-27T13:00:00');
  const now=new Date();
  const diff=target-now;
  if(diff<=0){
    document.getElementById('cdDisplay').textContent='¡EN CURSO!';
    return;
  }
  const h=Math.floor(diff/3600000);
  const m=Math.floor((diff%3600000)/60000);
  const s=Math.floor((diff%60000)/1000);
  document.getElementById('cdDisplay').textContent=
    String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}
updateCD();setInterval(updateCD,1000);

// Pick buttons
let picked=null;
function doPick(side){
  if(picked===side)return;
  picked=side;
  const btnL=document.getElementById('btnLeft');
  const btnR=document.getElementById('btnRight');
  btnL.classList.remove('picked','dimmed');
  btnR.classList.remove('picked','dimmed');
  if(side==='left'){
    btnL.classList.add('picked');
    btnR.classList.add('dimmed');
  } else {
    btnR.classList.add('picked');
    btnL.classList.add('dimmed');
  }
  showToast('¡Pick guardado! ✓');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
</script>
</body>
</html>
