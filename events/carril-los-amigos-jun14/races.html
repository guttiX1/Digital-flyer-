<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Programa · Carril Los Amigos · Jun 14</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#F5C518;--green:#00FF41;--dark:#070707;--bdr:rgba(255,255,255,.07)}
body{background:var(--dark);color:#fff;font-family:'Inter',-apple-system,sans-serif;overflow-x:hidden}
nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:.8rem 1.5rem;background:rgba(7,7,7,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--bdr)}
.nl{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.06em}.nl span{color:var(--gold)}
.nav-links{display:flex;gap:1.2rem;align-items:center}.nav-links a{color:rgba(255,255,255,.5);text-decoration:none;font-size:.75rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;transition:color .2s}.nav-links a:hover{color:#fff}
.btn-back{background:rgba(248,197,24,.12);border:1px solid rgba(248,197,24,.25);color:var(--gold);padding:.35rem .85rem;border-radius:6px}

/* HERO */
.page-hero{padding:4rem 1.5rem 2rem;text-align:center;position:relative;overflow:hidden;background:linear-gradient(180deg,rgba(248,197,24,.04) 0%,transparent 100%)}
.page-hero h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,8vw,6rem);line-height:.9;letter-spacing:.03em}
.page-hero h1 span{color:var(--gold)}
.page-hero .sub{color:rgba(255,255,255,.45);font-size:.95rem;margin-top:.6rem;letter-spacing:.06em;text-transform:uppercase}
.grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(248,197,24,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(248,197,24,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}

/* RACE LIST */
.container{max-width:900px;margin:0 auto;padding:0 1.5rem}
.race-list{padding:2rem 1.5rem 6rem;max-width:900px;margin:0 auto}
.race-row{display:grid;grid-template-columns:3rem 6rem 1fr auto;gap:1rem;align-items:center;padding:1.1rem 1.25rem;border-radius:14px;border:1px solid var(--bdr);margin-bottom:.65rem;transition:border-color .2s,background .2s,transform .15s;position:relative;overflow:hidden;opacity:0;transform:translateX(-20px);transition:opacity .4s ease,transform .4s ease,border-color .2s,background .2s}
.race-row.in{opacity:1;transform:none}
.race-row:hover{border-color:rgba(248,197,24,.22);background:rgba(255,255,255,.03);transform:translateX(4px)}
.race-row.featured{border-color:rgba(248,197,24,.4);background:linear-gradient(135deg,rgba(248,197,24,.06),transparent)}
.race-row.featured::before{content:'★ ESTELAR';position:absolute;top:0;right:0;background:var(--gold);color:#000;font-size:.52rem;font-weight:800;letter-spacing:.1em;padding:.18rem .5rem;border-radius:0 0 0 6px}
.rn{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:rgba(255,255,255,.12);line-height:1}
.rt{font-size:.75rem;font-weight:700;color:var(--gold);white-space:nowrap}
.rc-main .title{font-weight:700;font-size:.92rem;margin-bottom:.2rem}
.rc-main .horses{font-size:.75rem;color:rgba(255,255,255,.4)}
.rc-main .horses strong{color:rgba(255,255,255,.7)}
.rd{font-size:.72rem;background:rgba(255,255,255,.05);border:1px solid var(--bdr);padding:.22rem .6rem;border-radius:5px;white-space:nowrap;color:rgba(255,255,255,.5);text-align:right}
.race-row.featured .rd{background:rgba(248,197,24,.12);border-color:rgba(248,197,24,.3);color:var(--gold)}

/* FILTER TABS */
.filter-wrap{padding:1rem 1.5rem;max-width:900px;margin:0 auto;display:flex;gap:.5rem;flex-wrap:wrap}
.filter-btn{padding:.45rem 1rem;border-radius:8px;background:rgba(255,255,255,.04);border:1px solid var(--bdr);font-size:.72rem;font-weight:700;color:rgba(255,255,255,.5);letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .15s}
.filter-btn.active{background:rgba(248,197,24,.12);border-color:rgba(248,197,24,.35);color:var(--gold)}

/* FOOTER STRIP */
.foot-strip{background:rgba(255,255,255,.02);border-top:1px solid var(--bdr);padding:1.5rem;text-align:center;margin-top:2rem}
.foot-strip p{font-size:.72rem;color:rgba(255,255,255,.25);letter-spacing:.06em}
.foot-strip strong{color:var(--gold)}

@media(max-width:600px){
  .race-row{grid-template-columns:2.2rem 5rem 1fr;}.rd{display:none}
  .race-row .rc-main .horses{display:none}
}
</style>
</head>
<body>
<nav>
  <div class="nl">Carril <span>Los Amigos</span></div>
  <div class="nav-links">
    <a href="site.html" class="btn-back">← Sitio</a>
    <a href="infographic.html">Info</a>
    <a href="video-ad.html">Video</a>
  </div>
</nav>

<div class="page-hero">
  <div class="grid-bg"></div>
  <h1>Programa<br><span>Oficial</span></h1>
  <div class="sub">Domingo 14 de Junio, 2026 · Belton, Missouri · 18 Carreras</div>
</div>

<div class="filter-wrap">
  <div class="filter-btn active" data-filter="all">Todas (18)</div>
  <div class="filter-btn" data-filter="am">Mañana</div>
  <div class="filter-btn" data-filter="pm">Tarde</div>
  <div class="filter-btn" data-filter="featured">Estelar</div>
</div>

<div class="race-list" id="raceList"></div>

<div class="foot-strip">
  <p>📞 <strong>970 901 1260</strong> · $45 Entrada · carrerasos.com</p>
  <p style="margin-top:.3rem">Patrocinador: <strong>CarrerasOS</strong> · Sírvase solo caliente las tortillas</p>
</div>

<script>
const RACES = [
  {num:1, time:'10:30 AM',ampm:'am',title:'Abierta 3 Años No Mechados',dist:'275 yds'},
  {num:2, time:'11:00 AM',ampm:'am',title:'El Ruso vs El Gringo',h1:'El Ruso',c1:'C. Hnos Olvera',h2:'El Gringo',c2:'C. 4 Ases',dist:'350 yds',featured:true},
  {num:3, time:'11:30 AM',ampm:'am',title:'El Texano vs El Moro Talacho',h1:'El Texano',c1:'C. Gallegos',h2:'El Moro Talacho',c2:'C. Valsequillo',dist:'150 yds'},
  {num:4, time:'12:00 PM',ampm:'pm',title:'El Kene vs El Torpedo vs La Lucero',h1:'El Kene',c1:'C. Hnos Olvera',h2:'El Torpedo',c2:'C. Jarrocha Regreso',dist:'225 yds'},
  {num:5, time:'12:30 PM',ampm:'pm',title:'El Fenix vs Moro Sheetrockero',h1:'El Fenix',c1:'C. Sta Barbara',h2:'Moro Sheetrockero',c2:'C. Gallegos',dist:'225 yds'},
  {num:6, time:'1:00 PM', ampm:'pm',title:'Tapados — La Escondida vs Tres Letras',h1:'C. La Escondida',c1:'',h2:'C. Tres Letras',c2:'',dist:'250 yds'},
  {num:7, time:'1:30 PM', ampm:'pm',title:'El Scorpion vs El Plebe',h1:'El Scorpion',c1:'C. Sta Rosa',h2:'El Plebe',c2:'C. Jarrocha Regreso',dist:'150–175 yds'},
  {num:8, time:'2:00 PM', ampm:'pm',title:'La Buchona vs El Caro Quintero',h1:'La Buchona',c1:'C. Hnos Olvera',h2:'El Caro Quintero',c2:'C. Gallegos',dist:'150 yds'},
  {num:9, time:'2:30 PM', ampm:'pm',title:'Abierta Dos Años Verdes 3 Dentro',dist:'200 yds'},
  {num:10,time:'3:00 PM', ampm:'pm',title:'La Sanita vs La Princesa Diana',h1:'La Sanita',c1:'C. El Arenal',h2:'La Princesa Diana',c2:'C. Sta Barbara',dist:'300 yds'},
  {num:11,time:'3:30 PM', ampm:'pm',title:'El Tyson vs Tapado',h1:'El Tyson',c1:'C. Tamaulipas',h2:'Tapado',c2:'C. Sta Rosa',dist:'275 yds'},
  {num:12,time:'4:00 PM', ampm:'pm',title:'El Chivo vs La Dosis',h1:'El Chivo',c1:'C. Tarahumara',h2:'La Dosis',c2:'C. Veneno',dist:'250–350 yds'},
  {num:13,time:'4:30 PM', ampm:'pm',title:'Abierta Caballos de 9+ Años 3 Dentro',dist:'200 yds'},
  {num:14,time:'5:00 PM', ampm:'pm',title:'Abierta Caballos Locales Conocidos 6 Dentro',dist:'325 yds'},
  {num:15,time:'5:30 PM', ampm:'pm',title:'El Coronel vs El Italiano',h1:'El Coronel',c1:'C. Tamaulipas',h2:'El Italiano',c2:'C. Ramos',dist:'150 yds'},
  {num:16,time:'6:00 PM', ampm:'pm',title:'La Pancheta vs La Tormenta',h1:'La Pancheta',c1:'C. Sta Rosa',h2:'La Tormenta',c2:'C. Jarrocha Regreso',dist:'200 yds'},
  {num:17,time:'6:30 PM', ampm:'pm',title:'Final Derby',dist:'250 yds'},
  {num:18,time:'7:30 PM', ampm:'pm',title:'La Reyna Yaky vs El Dos Estados',h1:'La Reyna Yaky',c1:'C. Chavalones',h2:'El Dos Estados',c2:'C. Garrajas',dist:'250 yds'},
];

let currentFilter = 'all';

function buildList(filter) {
  const list = document.getElementById('raceList');
  list.innerHTML = '';
  const filtered = RACES.filter(r => filter === 'all' || filter === r.ampm || (filter === 'featured' && r.featured));
  filtered.forEach((r, i) => {
    const row = document.createElement('div');
    row.className = 'race-row' + (r.featured ? ' featured' : '');
    row.innerHTML = `
      <div class="rn">${String(r.num).padStart(2,'0')}</div>
      <div class="rt">${r.time}</div>
      <div class="rc-main">
        <div class="title">${r.title}</div>
        ${r.h1 ? `<div class="horses"><strong>${r.h1}</strong> ${r.c1 ? '· '+r.c1 : ''} &nbsp;vs&nbsp; <strong>${r.h2||''}</strong> ${r.c2 ? '· '+r.c2 : ''}</div>` : ''}
      </div>
      <div class="rd">${r.dist}</div>`;
    list.appendChild(row);
    setTimeout(() => row.classList.add('in'), i * 45);
  });
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    buildList(btn.dataset.filter);
  });
});

buildList('all');
</script>
</body>
</html>
