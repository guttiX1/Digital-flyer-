<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pesos Pesados · La Bolsa 2026</title>
<style>
/* ══════════════════════════════════════════════════════════════
   RACEDAY TEMPLATE — Pista Noir design system
   (black bg, #F5C518 gold, -apple-system font, glassmorphism cards)

   HOW TO REUSE FOR A NEW EVENT:
   1. Copy this file into events/<slug>/races.html
   2. Edit the EVENT object and RACES array in the script section
   3. Add horse photos to the PHOTOS map (optional — cards work without them)
   4. Update the <title> tag and the QR share URL
   ══════════════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000;--s1:rgba(255,255,255,.04);--bd:rgba(255,255,255,.07);
  --bd2:rgba(255,255,255,.13);--text:#fff;--dim:rgba(255,255,255,.5);
  --muted:rgba(255,255,255,.25);--gold:#F5C518;
  --font:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',Arial,sans-serif;
  --ease:cubic-bezier(.22,1,.36,1);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);-webkit-font-smoothing:antialiased;overflow-x:hidden;padding-bottom:40px}

/* ── NAV ── */
.nav{position:sticky;top:0;z-index:200;height:56px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;
  background:rgba(0,0,0,.75);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);
  border-bottom:1px solid var(--bd)}
.nav-l{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--dim)}
.nav-pills{display:flex;gap:8px}
.np{padding:6px 14px;border-radius:100px;font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
  text-decoration:none;white-space:nowrap}
.np-gold{background:var(--gold);color:#000}
.np-dim{background:var(--s1);border:1px solid var(--bd);color:var(--dim)}

main{position:relative;z-index:10;max-width:760px;margin:0 auto;padding:0 18px}

/* ── HERO ── */
.hero{text-align:center;padding:36px 0 24px;position:relative}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(245,197,24,.08) 0%,transparent 65%);pointer-events:none}
.hero-org{font-size:11px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--dim);position:relative}
.hero-title{font-size:clamp(2.8rem,13vw,5.2rem);font-weight:800;letter-spacing:-.03em;line-height:.88;margin:10px 0;position:relative}
.hero-title .top{display:block;color:var(--text)}
.hero-title .bottom{display:block;color:var(--gold)}
.hero-tagline{font-size:13px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-bottom:14px;position:relative}
.hero-star{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:100px;background:rgba(245,197,24,.08);
  border:1px solid rgba(245,197,24,.25);color:var(--gold);font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;position:relative}

/* ── DATE + LOCATION CARD ── */
.info-card{display:flex;gap:16px;align-items:center;margin:26px 0;padding:18px;background:var(--s1);border:1px solid var(--bd);
  border-radius:20px;transition:all .4s var(--ease)}
.date-block{flex-shrink:0;width:72px;text-align:center;background:rgba(245,197,24,.08);border:1px solid rgba(245,197,24,.2);
  border-radius:14px;padding:10px 4px}
.date-day{font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--gold)}
.date-num{font-size:1.8rem;font-weight:800;line-height:1.1;color:#fff}
.date-month{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--dim)}
.info-text{flex:1;min-width:0}
.info-loc{font-size:15px;font-weight:700;color:#fff}
.info-addr{font-size:12px;color:var(--dim);margin-top:2px}
.info-phones{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
.info-phones a{font-size:11px;font-weight:700;color:var(--gold);text-decoration:none;letter-spacing:.02em}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px}
.st{background:var(--s1);border:1px solid var(--bd);border-radius:16px;padding:14px 6px;text-align:center}
.st-n{font-size:1.6rem;font-weight:800;color:var(--gold);line-height:1}
.st-l{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:4px}

/* ── SPONSORS ── */
.sec-hd{display:flex;align-items:center;gap:10px;margin:26px 0 12px}
.sec-hd::before,.sec-hd::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--bd2),transparent)}
.sec-hd span{font-size:11px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);white-space:nowrap}
.sponsors{display:flex;gap:10px;flex-wrap:wrap}
.spn{flex:1;min-width:140px;background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:12px 14px}
.spn-name{font-size:13px;font-weight:800;color:#fff;letter-spacing:.02em}
.spn-cat{font-size:10px;color:var(--dim);margin-top:2px;text-transform:uppercase;letter-spacing:.06em}

/* ── RACE LIST ── */
.race-list{display:flex;flex-direction:column;gap:10px}
.rr{background:var(--s1);border:1px solid var(--bd);border-radius:18px;overflow:hidden;cursor:pointer;transition:all .3s var(--ease)}
.rr:hover{border-color:var(--bd2);transform:translateY(-2px)}
.rr.feat{border-color:rgba(245,197,24,.4);box-shadow:0 8px 30px rgba(245,197,24,.08)}
.rr-top{display:flex;align-items:center;gap:12px;padding:14px 16px}
.rr-badge{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.06);color:var(--gold);font-weight:800;font-size:13px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rr.feat .rr-badge{background:var(--gold);color:#000}
.rr-meta{flex:1;min-width:0}
.rr-time{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.05em}
.rr-cat{font-size:13px;font-weight:800;color:#fff;margin-top:2px}
.feat-tag{background:var(--gold);color:#000;font-size:9px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
  padding:3px 9px;border-radius:6px;flex-shrink:0}
.rr-dist{font-size:11px;font-weight:700;color:var(--dim);white-space:nowrap;flex-shrink:0}
.rr-purse{font-size:11px;font-weight:800;color:var(--gold);white-space:nowrap;flex-shrink:0}

/* duel row */
.rr-duel{display:flex;align-items:center;gap:10px;padding:0 16px 14px}
.rr-h{flex:1;min-width:0}
.rr-h.r{text-align:right}
.rr-hname{font-size:14px;font-weight:800;color:#fff;line-height:1.1}
.rr-hcuad{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
.rr-vs{font-size:11px;font-weight:800;color:var(--muted);flex-shrink:0}

/* open / abierta row */
.rr-open{padding:0 16px 14px}
.rr-note{font-size:11px;color:var(--dim);margin-bottom:8px;font-style:italic}
.entries{display:flex;flex-wrap:wrap;gap:6px}
.entry-chip{background:rgba(255,255,255,.05);border:1px solid var(--bd);border-radius:100px;padding:5px 12px;
  font-size:11px;font-weight:700;color:var(--dim)}

.count-badge{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.04em;white-space:nowrap}

/* ── FOOTER / SHARE ── */
.share{margin-top:30px;text-align:center;padding:22px;background:var(--s1);border:1px solid var(--bd);border-radius:20px}
.share-title{font-size:14px;font-weight:800;color:#fff;margin-bottom:6px}
.share-sub{font-size:11px;color:var(--dim);margin-bottom:14px}
.share-btn{display:inline-block;padding:12px 32px;background:#fff;color:#000;border:none;border-radius:100px;
  font-size:13px;font-weight:800;letter-spacing:.02em;cursor:pointer;font-family:var(--font)}
footer{padding:24px;text-align:center;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}

@media(max-width:380px){.rr-purse,.rr-dist{display:none}}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-l" id="navBrand">EVENT</div>
  <div class="nav-pills">
    <a class="np np-gold" href="#program">Programa</a>
    <a class="np np-dim" href="site.html">Sitio</a>
  </div>
</nav>

<main>
  <div class="hero">
    <div class="hero-org" id="heroOrg"></div>
    <div class="hero-title"><span class="top" id="heroTop"></span><span class="bottom" id="heroBottom"></span></div>
    <div class="hero-tagline" id="heroTagline"></div>
    <div class="hero-star" id="heroStar"></div>
  </div>

  <div class="info-card">
    <div class="date-block">
      <div class="date-day" id="dateDay"></div>
      <div class="date-num" id="dateNum"></div>
      <div class="date-month" id="dateMonth"></div>
    </div>
    <div class="info-text">
      <div class="info-loc" id="infoLoc"></div>
      <div class="info-addr" id="infoAddr"></div>
      <div class="info-phones" id="infoPhones"></div>
    </div>
  </div>

  <div class="stats" id="stats"></div>

  <div class="sec-hd"><span>Patrocinadores</span></div>
  <div class="sponsors" id="sponsors"></div>

  <div class="sec-hd" id="program"><span>Programa Completo</span></div>
  <div class="race-list" id="raceList"></div>

  <div class="share">
    <div class="share-title">Comparte el Programa</div>
    <div class="share-sub" id="shareSub"></div>
    <button class="share-btn" onclick="shareEvent()">Compartir</button>
  </div>
</main>

<footer>Pista Noir · CarrerasOS</footer>

<script>
// ══════════════════════════════════════════════════════════════
// EDIT EVERYTHING BELOW THIS LINE FOR EACH NEW EVENT
// ══════════════════════════════════════════════════════════════

const EVENT = {
  org: 'RANCHO EL CENTENARIO',
  titleTop: 'PESOS',
  titleBottom: 'PESADOS',
  tagline: 'LA BOLSA 2026',
  stars: '15 CARRERAS ADENTRO',
  dayName: 'DOMINGO',
  dayNum: '12',
  month: 'DE JULIO',
  year: '2026',
  location: 'Milner, Georgia',
  address: '251 High Falls Park Rd, Milner, GA',
  phones: ['(706) 461-2079', '(678) 767-2199'],
  sponsors: [
    { name: 'NUEVO IMPERIO', cat: 'Patrocinador Oficial' },
    { name: 'PELAVACAS', cat: 'Promotions' },
  ],
  counts: '15 carreras · 8 de cuadre',
  shareUrl: 'https://guttix1.github.io/Digital-flyer-/events/pesos-pesados-jul12/races.html',
};

// type: 'duel' (head-to-head, 2-3 horses) or 'open' (abierta, list of stable entries)
const RACES = [
  { id: 1, time: '09:00 AM', dist: '250Y', type: 'duel', horses: [
    { name: 'TAPADO', stable: 'C. JL' }, { name: 'TAPADO', stable: 'C. CHIHUAHUA' } ] },
  { id: 2, time: '10:00 AM', dist: '300Y', type: 'duel', horses: [
    { name: 'TAPADO', stable: 'C. JL' }, { name: 'TAPADO', stable: 'C. TOVAR 81' } ] },
  { id: 3, time: '10:30 AM', dist: '200Y', type: 'duel', horses: [
    { name: 'LA FELINA', stable: 'C. RANCHO LARA' }, { name: 'LA CHAPARRA', stable: 'C. LOS PELONES' } ] },
  { id: 4, time: '11:00 AM', dist: '175Y', type: 'duel', section: 'TAPADOS 2 AÑEROS', horses: [
    { name: 'TAPADO', stable: 'C. ESQUIPULAS' }, { name: 'TAPADO', stable: 'C. OJO DE AGUA' }, { name: 'TAPADO', stable: 'C. W3 FARMS' } ] },
  { id: 5, time: '11:30 AM', dist: '100Y', type: 'duel', horses: [
    { name: 'TAPADO', stable: 'C. JL' }, { name: 'EL 2020', stable: 'C. TOVAR 81' } ] },
  { id: 6, time: '12:00 PM', dist: '300Y', type: 'duel', horses: [
    { name: 'TAPADO', stable: 'C. OJO DE AGUA' }, { name: 'TAPADO', stable: 'C. LA ESCONDIDA' } ] },
  { id: 7, time: '12:30 PM', dist: '250Y', type: 'duel', horses: [
    { name: 'TAPADO', stable: 'C. LA PAROTA' }, { name: 'TAPADO', stable: 'C. JN' } ] },
  { id: 8, time: '01:00 PM', dist: '125Y', type: 'open', category: 'ABIERTA', entryNote: '3 dentro', entries: ['C. NV. IMPERIO/ESCONDIDA', 'C. CRISTO REY', 'C. SANTA MÓNICA', 'C. PETROLEROS'] },
  { id: 9, time: '01:30 PM', dist: '250Y', type: 'open', category: 'ABIERTA C. CHICAS', purse: '$1.5K', entryNote: 'No Cristo Rey · No Diamante · No Escondida/Imperio', entries: ['C. JL', 'C. JN', 'C. ESQUIPULAS', 'C. PELONES JIMÉNEZ', 'C. MORA'] },
  { id: 10, time: '02:00 PM', dist: '200Y', type: 'open', category: 'ABIERTA DE CONDICIÓN', entryNote: '3 dentro', entries: ['C. OJO DE AGUA', 'C. SAN MIGUEL', 'C. CRISTO REY'] },
  { id: 11, time: '03:00 PM', dist: '5Y', type: 'open', category: 'ABIERTA', entries: ['C. OJO DE AGUA', 'C. LA ESCONDIDA', 'C. LAREDO', 'C. SAN JUAN'] },
  { id: 12, time: '04:00 PM', dist: '200Y', type: 'open', category: 'ABIERTA', entryNote: '5 dentro', entries: ['C. PETROLEROS', 'C. ALFA', 'C. LA NORIA', 'C. RANCHO EL DIAMANTE', 'C. CINA NV. LEÓN'] },
  { id: 13, time: '05:00 PM', dist: '300Y', type: 'open', featured: true, purse: '$15K', category: 'CARRERA ESTELAR · PESOS PESADOS', entries: ['C. NV. IMPERIO/ESCONDIDA', 'C. CRISTO REY', 'C. PETROLEROS', 'C. RANCHO EL DIAMANTE'] },
  { id: 14, time: '06:00 PM', dist: '400Y', type: 'open', featured: true, category: 'REY DE LAS 400 · CARRERA ESTELAR', entries: ['C. LA ESCONDIDA/NV. IMPERIO', 'C. CRISTO REY', 'C. CHINA NV. LEÓN', 'C. RANCHO EL DIAMANTE', 'C. PETROLEROS', 'C. LOS MICHOACANOS'] },
  { id: 15, time: '07:00 PM', dist: '250Y', type: 'duel', horses: [
    { name: 'EL NIÑO', stable: 'C. LOS MICHOACANOS' }, { name: 'EL 5', stable: 'C. LA ESCONDIDA' } ] },
];

// ══════════════════════════════════════════════════════════════
// RENDER — no need to touch anything below
// ══════════════════════════════════════════════════════════════

document.getElementById('navBrand').textContent = EVENT.org;
document.getElementById('heroOrg').textContent = EVENT.org;
document.getElementById('heroTop').textContent = EVENT.titleTop;
document.getElementById('heroBottom').textContent = EVENT.titleBottom;
document.getElementById('heroTagline').textContent = EVENT.tagline;
document.getElementById('heroStar').textContent = '⭐ ' + EVENT.stars;
document.getElementById('dateDay').textContent = EVENT.dayName;
document.getElementById('dateNum').textContent = EVENT.dayNum;
document.getElementById('dateMonth').textContent = EVENT.month + ' ' + EVENT.year;
document.getElementById('infoLoc').textContent = EVENT.location;
document.getElementById('infoAddr').textContent = EVENT.address;
document.getElementById('shareSub').textContent = EVENT.counts;
document.title = EVENT.titleTop + ' ' + EVENT.titleBottom + ' · ' + EVENT.tagline;

const phonesEl = document.getElementById('infoPhones');
EVENT.phones.forEach(p => {
  const a = document.createElement('a');
  a.href = 'tel:' + p.replace(/[^0-9+]/g, '');
  a.textContent = '☎ ' + p;
  phonesEl.appendChild(a);
});

const duelCount = RACES.filter(r => r.type === 'duel').length;
const openCount = RACES.filter(r => r.type === 'open').length;
document.getElementById('stats').innerHTML = `
  <div class="st"><div class="st-n">${RACES.length}</div><div class="st-l">Carreras</div></div>
  <div class="st"><div class="st-n">${duelCount}</div><div class="st-l">De Cuadre</div></div>
  <div class="st"><div class="st-n">${openCount}</div><div class="st-l">Abiertas</div></div>
`;

const sponsorsEl = document.getElementById('sponsors');
EVENT.sponsors.forEach(s => {
  sponsorsEl.innerHTML += `<div class="spn"><div class="spn-name">${s.name}</div><div class="spn-cat">${s.cat}</div></div>`;
});

const list = document.getElementById('raceList');
RACES.forEach(r => {
  const card = document.createElement('div');
  card.className = 'rr' + (r.featured ? ' feat' : '');

  const label = r.type === 'duel' ? (r.section || 'Carrera de Cuadre') : r.category;

  const body = r.type === 'duel'
    ? `<div class="rr-duel">
        <div class="rr-h"><div class="rr-hname">${r.horses[0].name}</div><div class="rr-hcuad">${r.horses[0].stable}</div></div>
        <div class="rr-vs">VS</div>
        <div class="rr-h r"><div class="rr-hname">${r.horses[1].name}</div><div class="rr-hcuad">${r.horses[1].stable}</div></div>
        ${r.horses[2] ? `<div class="rr-vs">VS</div><div class="rr-h r"><div class="rr-hname">${r.horses[2].name}</div><div class="rr-hcuad">${r.horses[2].stable}</div></div>` : ''}
      </div>`
    : `<div class="rr-open">
        ${r.entryNote ? `<div class="rr-note">${r.entryNote}</div>` : ''}
        <div class="entries">${r.entries.map(e => `<span class="entry-chip">${e}</span>`).join('')}</div>
      </div>`;

  card.innerHTML = `
    <div class="rr-top">
      <div class="rr-badge">${r.id}</div>
      <div class="rr-meta">
        <div class="rr-time">${r.time}</div>
        <div class="rr-cat">${label}</div>
      </div>
      ${r.featured ? '<span class="feat-tag">⭐ Estelar</span>' : ''}
      ${r.purse ? `<span class="rr-purse">${r.purse}</span>` : ''}
      <span class="rr-dist">${r.dist}</span>
    </div>
    ${body}
  `;
  list.appendChild(card);
});

function shareEvent(){
  let txt = `🏆 ${EVENT.titleTop} ${EVENT.titleBottom} — ${EVENT.tagline}\n📅 ${EVENT.dayName} ${EVENT.dayNum} ${EVENT.month} ${EVENT.year} · ${EVENT.location}\n${EVENT.counts}\n\n${EVENT.shareUrl}`;
  if (navigator.share) navigator.share({ title: document.title, text: txt }).catch(()=>{});
  else navigator.clipboard.writeText(txt).catch(()=>{});
}
</script>
</body>
</html>
